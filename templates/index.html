<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализатор размера папок v.1.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background: #f0f2f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 0;
        }
        
        .container-fluid-custom {
            max-width: 100%;
            padding: 0 20px;
            margin: 0 auto;
        }
        
        .navbar {
            padding: 8px 20px;
        }
        
        .folder-clickable { cursor: pointer; transition: background 0.2s; }
        .folder-clickable:hover { background: #e8f4fd; }
        
        .btn-back { background: #28a745; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
        .btn-back:hover { background: #218838; }
        .btn-back i { margin-right: 4px; }
        
        .btn-home { background: #007bff; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
        .btn-home:hover { background: #0069d9; }
        .btn-home i { margin-right: 4px; }
        
        .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 9999; display: none; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast-custom { background: white; border-radius: 10px; padding: 12px 20px; margin-bottom: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); border-left: 4px solid #0d6efd; min-width: 250px; }
        
        .path-tag { display: inline-block; background: #e9ecef; padding: 4px 12px; border-radius: 15px; margin: 4px; font-size: 0.9rem; }
        .path-tag .remove-path { cursor: pointer; margin-left: 8px; color: #dc3545; font-weight: bold; }
        .empty-paths { color: #6c757d; font-style: italic; margin: 8px 0; }
        
        .open-paths-list {
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 4px 6px;
            background: #f8f9fa;
        }
        .open-paths-list::-webkit-scrollbar { width: 4px; }
        .open-paths-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 2px; }
        .open-paths-list::-webkit-scrollbar-thumb { background: #c1c7cd; border-radius: 2px; }
        
        .open-path-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        .open-path-item:last-child { border-bottom: none; }
        .open-path-item:hover { background: #e9ecef; }
        .open-path-item .path-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.75rem;
            color: #495057;
        }
        .open-path-item .path-close-btn {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            padding: 0 4px;
            font-size: 1rem;
            line-height: 1;
            transition: all 0.2s;
            opacity: 0.6;
        }
        .open-path-item .path-close-btn:hover {
            opacity: 1;
            transform: scale(1.2);
            color: #c82333;
        }
        .open-path-item .path-badge {
            font-size: 0.55rem;
            padding: 1px 6px;
            border-radius: 10px;
            margin-right: 6px;
            background: #0d6efd;
            color: white;
        }
        .open-path-item .path-badge.db { background: #28a745; }
        .open-path-item .path-badge.scan { background: #fd7e14; }
        
        .top-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .top-panel .scan-card {
            flex: 0 0 380px;
            min-width: 320px;
        }
        .top-panel .history-card {
            flex: 1;
            min-width: 0;
        }
        
        @media (max-width: 992px) {
            .top-panel {
                flex-direction: column;
            }
            .top-panel .scan-card {
                flex: 1;
                width: 100%;
            }
        }
        
        .stat-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .stat-row .stat-item { flex: 1; min-width: 80px; background: #f8f9fa; border-radius: 6px; padding: 8px; text-align: center; }
        .stat-row .stat-item .value { font-size: 1.1rem; font-weight: bold; color: #0d6efd; }
        .stat-row .stat-item .label { font-size: 0.7rem; color: #6c757d; }
        
        .level-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 15px; }
        
        .chart-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            margin-bottom: 15px;
        }
        .chart-section .section-title {
            font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid #0d6efd; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .chart-section .section-title .path-text { font-weight: 400; color: #6c757d; font-size: 0.8rem; word-break: break-all; }
        .chart-section .chart-card { background: white; border-radius: 6px; padding: 12px; border: 1px solid #e9ecef; margin-bottom: 8px; }
        .chart-section .chart-card:last-child { margin-bottom: 0; }
        .chart-section .chart-card h6 { color: #0d6efd; font-size: 0.9rem; margin-bottom: 8px; }
        .chart-section .chart-card .chart-wrapper { width: 100%; min-height: 250px; overflow: visible; }
        .chart-section .chart-card .chart-wrapper .plotly-graph-div { width: 100% !important; height: 450px !important; }
        
        .chart-section.level-1 { border-color: #fd7e14; }
        .chart-section.level-1 .section-title { border-bottom-color: #fd7e14; }
        .chart-section.level-1 .section-title .badge { background: #fd7e14; color: white; }
        .chart-section.level-1 .chart-card h6 { color: #fd7e14; }
        
        .chart-section.level-2 { border-color: #0d6efd; }
        .chart-section.level-2 .section-title { border-bottom-color: #0d6efd; }
        .chart-section.level-2 .section-title .badge { background: #0d6efd; color: white; }
        .chart-section.level-2 .chart-card h6 { color: #0d6efd; }
        
        .accordion-report {
            margin-bottom: 15px;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .accordion-report .accordion-header {
            background: #f8f9fa;
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
            user-select: none;
            border-bottom: 1px solid #dee2e6;
        }
        .accordion-report .accordion-header:hover {
            background: #e9ecef;
        }
        .accordion-report .accordion-header .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        .accordion-report .accordion-header .header-left .path-name {
            font-weight: 600;
            font-size: 0.95rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #1a1a2e;
            font-family: 'Consolas', 'Courier New', monospace;
        }
        .accordion-report .accordion-header .header-left .path-badge {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 12px;
            background: #0d6efd;
            color: white;
        }
        .accordion-report .accordion-header .header-left .path-badge.db { background: #28a745; }
        .accordion-report .accordion-header .header-left .path-badge.scan { background: #fd7e14; }
        .accordion-report .accordion-header .header-left .stat-info {
            font-size: 0.75rem;
            color: #6c757d;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .accordion-report .accordion-header .header-left .stat-info span {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .accordion-report .accordion-header .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .accordion-report .accordion-header .header-right .btn-sm {
            font-size: 0.7rem;
            padding: 2px 10px;
        }
        .accordion-report .accordion-header .accordion-toggle {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
            color: #6c757d;
            margin-left: 8px;
        }
        .accordion-report .accordion-header .accordion-toggle.collapsed {
            transform: rotate(-90deg);
        }
        
        .accordion-report .accordion-body {
            padding: 20px;
            background: white;
            display: none;
        }
        .accordion-report .accordion-body.show {
            display: block;
        }
        
        .level-divider { border: none; border-top: 2px dashed #6c757d; margin: 15px 0; opacity: 0.5; }
        .level-2-section { display: none; }
        .level-2-section.active { display: block; }
        
        .folders-section {
            background: #f8f9fa; 
            border-radius: 6px; 
            padding: 10px; 
            border: 1px solid #e9ecef; 
            margin-top: 8px;
        }
        .folders-section .folders-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 8px; 
            flex-wrap: wrap; 
            gap: 8px;
        }
        .folders-section .folders-header h6 { 
            margin: 0; 
            font-size: 0.9rem; 
        }
        .folders-section .folders-header h6 span {
            color: #0d6efd;
            background: rgba(13, 110, 253, 0.1);
            padding: 0 8px;
            border-radius: 4px;
        }
        .folders-section .folders-nav { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .folders-section .list-group-item { border-left: 3px solid #fd7e14; padding: 6px 12px; font-size: 0.9rem; }
        .folders-section.level-2 .list-group-item { border-left-color: #0d6efd; }
        .folders-section .list-group-item .badge { font-size: 0.75rem; }
        
        .nav-empty { color: #6c757d; font-size: 0.8rem; font-style: italic; }
        .breadcrumb-nav { font-size: 0.8rem; margin: 0; padding: 0; background: transparent; display: inline-flex; flex-wrap: wrap; align-items: center; }
        .breadcrumb-nav .breadcrumb-item { font-size: 0.8rem; display: inline-flex; align-items: center; }
        .breadcrumb-nav .breadcrumb-item a { color: #007bff; text-decoration: none; cursor: pointer; }
        .breadcrumb-nav .breadcrumb-item a:hover { text-decoration: underline; }
        .breadcrumb-nav .breadcrumb-item.active { color: #495057; }
        .breadcrumb-nav .breadcrumb-item + .breadcrumb-item::before { content: "›"; color: #adb5bd; padding: 0 4px; }
        
        .nav-separator { color: #dee2e6; margin: 0 4px; }
        
        .layout-wrapper {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            min-height: 600px;
        }
        
        .sidebar {
            width: 380px;
            min-width: 320px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            background: white;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            padding: 12px;
            position: sticky;
            top: 20px;
        }
        
        .sidebar .sidebar-header {
            font-size: 0.9rem; font-weight: 600; color: #495057; padding-bottom: 8px; border-bottom: 2px solid #0d6efd; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 10;
        }
        .sidebar .sidebar-header .badge { font-size: 0.7rem; }
        
        .sidebar .folder-tree-section {
            margin-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }
        .sidebar .folder-tree-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .sidebar .folder-tree-header {
            font-size: 0.7rem;
            font-weight: 600;
            color: #495057;
            padding: 4px 0 6px 0;
            border-bottom: 2px solid #0d6efd;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .sidebar .folder-tree-header:hover {
            background: #f8f9fa;
        }
        .sidebar .folder-tree-header .badge {
            font-size: 0.6rem;
        }
        .sidebar .folder-tree-header .path-text {
            font-weight: 400;
            font-size: 0.65rem;
            color: #6c757d;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 220px;
        }
        
        .sidebar .folder-tree { list-style: none; padding: 0; margin: 0; }
        .sidebar .folder-tree li { padding: 0; }
        .sidebar .folder-tree .folder-item {
            display: flex; align-items: center; padding: 3px 8px; border-radius: 4px; cursor: pointer; transition: background 0.15s; font-size: 0.82rem; gap: 6px;
        }
        .sidebar .folder-tree .folder-item:hover { background: #e8f4fd; }
        .sidebar .folder-tree .folder-item.active { background: #cce5ff; font-weight: 600; }
        .sidebar .folder-tree .folder-item .folder-icon { color: #fd7e14; font-size: 0.85rem; }
        .sidebar .folder-tree .folder-item .folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar .folder-tree .folder-item .folder-size { font-size: 0.65rem; color: #6c757d; background: #f1f3f5; padding: 1px 6px; border-radius: 10px; }
        .sidebar .folder-tree .folder-item .level-badge-sm { font-size: 0.55rem; padding: 1px 6px; border-radius: 10px; background: #e9ecef; color: #495057; }
        .sidebar .folder-tree .folder-item .level-badge-sm.level1 { background: #fd7e14; color: white; }
        .sidebar .folder-tree .folder-item .level-badge-sm.level2 { background: #0d6efd; color: white; }
        
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: #c1c7cd; border-radius: 3px; }
        .sidebar::-webkit-scrollbar-thumb:hover { background: #a8b0b8; }
        
        .main-content { flex: 1; min-width: 0; }
        
        .empty-sidebar {
            padding: 10px;
            text-align: center;
            color: #6c757d;
            font-size: 0.85rem;
        }
        
        .history-list .list-group-item {
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        .history-list .list-group-item .badge {
            font-size: 0.7rem;
        }
        
        @media (max-width: 992px) {
            .layout-wrapper { flex-direction: column; }
            .sidebar { width: 100%; max-height: 300px; position: relative; top: 0; }
            .top-panel .scan-card {
                flex: 1;
                width: 100%;
            }
            .accordion-report .accordion-header .header-left .stat-info {
                display: none;
            }
        }

        @media (min-width: 1600px) {
            .sidebar {
                width: 420px;
                min-width: 360px;
            }
            .sidebar .folder-tree-header .path-text {
                max-width: 260px;
            }
            .top-panel .scan-card {
                flex: 0 0 420px;
            }
        }

        .histogram-wrapper-scroll {
            overflow-y: auto;
            max-height: 650px;
            overflow-x: hidden;
            padding-right: 5px;
        }
        
        .histogram-wrapper-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .histogram-wrapper-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .histogram-wrapper-scroll::-webkit-scrollbar-thumb {
            background: #c1c7cd;
            border-radius: 4px;
        }
        .histogram-wrapper-scroll::-webkit-scrollbar-thumb:hover {
            background: #a8b0b8;
        }
        
        .histogram-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
            background: white;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            padding: 5px 0;
        }
        .histogram-scroll-wrapper::-webkit-scrollbar {
            height: 12px;
            background: #f1f1f1;
            border-radius: 6px;
        }
        .histogram-scroll-wrapper::-webkit-scrollbar-thumb {
            background: #c1c7cd;
            border-radius: 6px;
        }
        .histogram-scroll-wrapper::-webkit-scrollbar-thumb:hover {
            background: #a8b0b8;
        }
        .histogram-scroll-wrapper .histogram-inner {
            min-width: 100%;
            width: auto;
            padding: 5px 0;
            display: inline-block;
        }
        .histogram-scroll-wrapper .histogram-inner .plotly-graph-div {
            width: 100% !important;
            height: 450px !important;
            min-width: 800px;
        }
        
        .scroll-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            font-size: 0.75rem;
            color: #495057;
            background: #f8f9fa;
            border-radius: 0 0 8px 8px;
            border-top: 1px solid #e9ecef;
            flex-wrap: wrap;
            gap: 6px;
        }
        .scroll-indicator .scroll-arrow {
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 4px;
            user-select: none;
            background: #e9ecef;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }
        .scroll-indicator .scroll-arrow:hover {
            background: #dee2e6 !important;
            transform: scale(1.05);
        }
        .scroll-indicator .badge {
            font-size: 0.6rem;
            padding: 2px 8px;
        }

        .btn-excel {
            background: #1d6f42;
            color: white;
            border: none;
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(29, 111, 66, 0.3);
        }
        .btn-excel:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(29, 111, 66, 0.4);
            background: #155a34;
        }
        .btn-excel i {
            margin-right: 4px;
        }

        .scroll-top-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            border: none;
            box-shadow: 0 4px 20px rgba(13, 110, 253, 0.4);
            cursor: pointer;
            font-size: 1.5rem;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 9999;
            opacity: 0;
            transform: translateY(20px);
        }
        .scroll-top-btn.show {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }
        .scroll-top-btn:hover {
            background: linear-gradient(135deg, #0a58ca, #084298);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 30px rgba(13, 110, 253, 0.5);
        }
        .scroll-top-btn:active {
            transform: scale(0.95);
        }
        .scroll-top-btn i {
            font-size: 1.8rem;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .scroll-top-btn.show {
            animation: fadeInUp 0.3s ease forwards;
        }
        @media (max-width: 768px) {
            .scroll-top-btn {
                bottom: 20px;
                right: 20px;
                width: 48px;
                height: 48px;
                font-size: 1.2rem;
            }
            .scroll-top-btn i {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid-custom">
            <span class="navbar-brand"><i class="bi bi-folder2-open"></i> Анализатор размера папок</span>
            <span class="text-white-50"><i class="bi bi-database"></i> PostgreSQL</span>
        </div>
    </nav>

    <div class="container-fluid-custom mt-3">
        <div class="top-panel">
            <div class="card scan-card">
                <div class="card-header bg-primary text-white"><i class="bi bi-search"></i> Сканировать / Загрузить</div>
                <div class="card-body">
                    <form id="scanForm">
                        <div class="mb-3">
                            <label class="form-label">Добавить путь</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="pathInput" 
                                       placeholder="Например: C:\Users или \\server\share" value="">
                                <button class="btn btn-outline-secondary" type="button" onclick="addPath()">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div id="pathTags" class="mb-3"><div class="empty-paths">Нет добавленных путей</div></div>
                        <div class="d-flex gap-2 w-100">
                            <button type="submit" class="btn btn-primary flex-grow-1" id="scanBtn" disabled>
                                <i class="bi bi-play-fill"></i> Сканировать
                            </button>
                            <button type="button" class="btn btn-success flex-grow-1" id="loadFromDbBtn" disabled>
                                <i class="bi bi-database-fill"></i> Загрузить из БД
                            </button>
                        </div>
                        <small class="text-muted d-block mt-2" id="pathCountInfo">Добавьте путь для сканирования или загрузки</small>
                    </form>
                    <div id="scanProgress" class="mt-3" style="display:none;">
                        <div class="progress"><div class="progress-bar progress-bar-striped progress-bar-animated" style="width:100%">Обработка...</div></div>
                    </div>
                    
                    <div id="openPathsContainer" class="mt-3" style="display:none;">
                        <hr>
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted"><i class="bi bi-folder-open"></i> Открытые каталоги:</small>
                            <small class="text-muted" id="openPathsCount">0</small>
                        </div>
                        <div class="open-paths-list" id="openPathsList"></div>
                    </div>
                </div>
            </div>

            <div class="card history-card">
                <div class="card-header bg-success text-white"><i class="bi bi-clock-history"></i> История сканирований</div>
                <div class="card-body history-list" id="pathsList">
                    <div class="text-center text-muted py-4"><i class="bi bi-inbox" style="font-size:2rem;"></i><p class="mt-2">Нет сохраненных сканирований</p></div>
                </div>
            </div>
        </div>

        <div id="reportSection" class="mt-3" style="display:none;">
            <div class="layout-wrapper">
                <div class="sidebar" id="sidebarPanel">
                    <div class="sidebar-header">
                        <span><i class="bi bi-list-ul"></i> Содержание</span>
                        <span class="badge bg-secondary" id="folderCountBadge">0</span>
                    </div>
                    <div id="folderTreeContainer">
                        <div class="empty-sidebar">
                            <i class="bi bi-folder" style="font-size:2rem;display:block;margin-bottom:10px;"></i>
                            Нет папок для отображения
                        </div>
                    </div>
                </div>
                <div class="main-content" id="mainContent"></div>
            </div>
        </div>
    </div>

    <div class="loading" id="loading"><div class="spinner-border text-primary" role="status"></div><p class="mt-3">Загрузка данных...</p></div>
    <div class="toast-container" id="toastContainer"></div>

    <button class="scroll-top-btn" id="scrollTopBtn" onclick="scrollToTop()" title="Наверх">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script>
        // ============================================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        var pathsToScan = [];
        var multipleDataStore = {};
        var currentPathId = null;
        var openPaths = [];

        // ============================================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================

        function formatSize(bytes) {
            if (!bytes) return '0 Б';
            if (bytes >= 1024**3) return (bytes / (1024**3)).toFixed(2) + ' ГБ';
            if (bytes >= 1024**2) return (bytes / (1024**2)).toFixed(2) + ' МБ';
            if (bytes >= 1024) return (bytes / 1024).toFixed(2) + ' КБ';
            return bytes + ' Б';
        }

        function showToast(message, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var colors = { success: '#2ECC71', error: '#E74C3C', warning: '#F39C12', info: '#0d6efd' };
            var toast = document.createElement('div');
            toast.className = 'toast-custom';
            toast.style.borderLeftColor = colors[type] || colors.info;
            toast.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <span>${message}</span>
                    <button class="btn btn-sm btn-link text-dark" onclick="this.parentElement.parentElement.remove()">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(function() {
                if (toast.parentElement) {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100px)';
                    setTimeout(function() { toast.remove(); }, 300);
                }
            }, 4000);
        }

        function normalizeUncPath(path) {
            if (!path) return path;
            path = path.trim();
            if (path.startsWith('\\') && !path.startsWith('\\\\')) {
                path = '\\' + path;
            }
            path = path.replace(/\\\\\\\\/g, '\\\\');
            path = path.replace(/\\\\\\/g, '\\\\');
            if (path.startsWith('\\\\')) {
                var parts = path.split('\\').filter(function(p) { return p !== ''; });
                if (parts.length >= 2) {
                    var server = parts[0];
                    var share = parts[1];
                    var rest = parts.slice(2).join('\\');
                    if (rest) {
                        path = '\\\\' + server + '\\' + share + '\\' + rest;
                    } else {
                        path = '\\\\' + server + '\\' + share;
                    }
                }
            }
            return path;
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================================================
        // УПРАВЛЕНИЕ СПИСКОМ ОТКРЫТЫХ КАТАЛОГОВ
        // ============================================================

        function findOpenPathByPath(path) {
            return openPaths.find(function(item) { 
                return item.path.toLowerCase() === path.toLowerCase(); 
            });
        }

        function findOpenPathById(pathId) {
            return openPaths.find(function(item) { 
                return item.pathId === pathId; 
            });
        }

        function addOpenPath(pathId, path, type) {
            var existing = findOpenPathByPath(path);
            if (existing) {
                existing.pathId = pathId;
                existing.type = type;
                updateOpenPathsList();
                return existing;
            }
            
            var newItem = {
                pathId: pathId,
                path: path,
                type: type || 'scan'
            };
            openPaths.push(newItem);
            updateOpenPathsList();
            return newItem;
        }

        function removeOpenPath(pathId) {
            var index = openPaths.findIndex(function(item) { return item.pathId === pathId; });
            if (index === -1) return;
            
            var path = openPaths[index].path;
            openPaths.splice(index, 1);
            
            var pathIndex = pathsToScan.indexOf(path);
            if (pathIndex !== -1) {
                pathsToScan.splice(pathIndex, 1);
                updatePathTags();
            }
            
            if (multipleDataStore[pathId]) {
                delete multipleDataStore[pathId];
            }
            
            var card = document.getElementById('accordion-' + pathId);
            if (card) {
                card.remove();
            }
            
            var section = document.getElementById('folderTreeSection_' + pathId);
            if (section) {
                section.remove();
            }
            
            updateOpenPathsList();
            updateSidebar();
            
            var totalFolders = Object.keys(multipleDataStore).length;
            document.getElementById('folderCountBadge').textContent = totalFolders;
            
            if (Object.keys(multipleDataStore).length === 0) {
                document.getElementById('reportSection').style.display = 'none';
                document.getElementById('mainContent').innerHTML = '';
            }
            
            showToast('🗑️ Закрыт каталог: ' + path, 'info');
        }

        function updateOpenPathsList() {
            var container = document.getElementById('openPathsContainer');
            var list = document.getElementById('openPathsList');
            var count = document.getElementById('openPathsCount');
            
            if (openPaths.length === 0) {
                if (container) container.style.display = 'none';
                return;
            }
            
            if (container) container.style.display = 'block';
            if (count) count.textContent = openPaths.length;
            
            var html = '';
            openPaths.forEach(function(item) {
                var shortPath = item.path;
                if (shortPath.length > 40) {
                    shortPath = '...' + shortPath.substring(shortPath.length - 37);
                }
                var badgeClass = item.type === 'scan' ? 'scan' : 'db';
                var badgeText = item.type === 'scan' ? 'Скан' : 'БД';
                html += `
                    <div class="open-path-item">
                        <span class="path-badge ${badgeClass}">${badgeText}</span>
                        <span class="path-name" title="${item.path}">${shortPath}</span>
                        <button class="path-close-btn" onclick="removeOpenPath('${item.pathId}')" title="Закрыть каталог">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </div>
                `;
            });
            if (list) list.innerHTML = html;
        }

        // ============================================================
        // ФУНКЦИЯ ЭКСПОРТА В EXCEL
        // ============================================================

        function exportExcelForPath(pathId, path) {
            if (!path) {
                var store = multipleDataStore[pathId];
                if (store) {
                    path = store.currentPath || store.rootPath;
                }
            }
            
            if (!path) {
                showToast('❌ Путь не найден', 'error');
                return;
            }
            
            try {
                path = decodeURIComponent(path);
            } catch (e) {}
            
            showToast('📊 Генерация Excel отчета для: ' + path, 'info');
            document.getElementById('loading').style.display = 'block';
            
            fetch('/api/export_excel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: path })
            })
            .then(function(response) {
                document.getElementById('loading').style.display = 'none';
                
                if (!response.ok) {
                    return response.json().then(function(err) {
                        throw new Error(err.error || 'Ошибка сервера');
                    });
                }
                
                var filename = 'report.xlsx';
                var contentDisposition = response.headers.get('Content-Disposition');
                if (contentDisposition) {
                    var match = contentDisposition.match(/filename=([^;]+)/);
                    if (match) {
                        filename = match[1];
                    }
                }
                
                return response.blob().then(function(blob) {
                    return { blob: blob, filename: filename };
                });
            })
            .then(function(result) {
                var url = URL.createObjectURL(result.blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = result.filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(function() { URL.revokeObjectURL(url); }, 100);
                showToast('✅ Excel отчет скачан: ' + result.filename, 'success');
            })
            .catch(function(e) {
                document.getElementById('loading').style.display = 'none';
                showToast('❌ Ошибка экспорта: ' + e.message, 'error');
            });
        }

        // ============================================================
        // УПРАВЛЕНИЕ ПУТЯМИ
        // ============================================================

        function addPath() {
            var input = document.getElementById('pathInput');
            var path = input.value.trim();
            if (!path) { showToast('Введите путь', 'warning'); return; }
            path = normalizeUncPath(path);
            if (pathsToScan.indexOf(path) !== -1) { showToast('Путь уже добавлен', 'warning'); return; }
            pathsToScan.push(path);
            input.value = '';
            updatePathTags();
            showToast('Добавлен путь: ' + path, 'success');
        }

        function removePath(path) {
            pathsToScan = pathsToScan.filter(function(p) { return p !== path; });
            updatePathTags();
        }

        function updatePathTags() {
            var container = document.getElementById('pathTags');
            var scanBtn = document.getElementById('scanBtn');
            var loadBtn = document.getElementById('loadFromDbBtn');
            var info = document.getElementById('pathCountInfo');
            
            if (pathsToScan.length === 0) {
                if (container) container.innerHTML = '<div class="empty-paths">Нет добавленных путей</div>';
                if (scanBtn) scanBtn.disabled = true;
                if (loadBtn) loadBtn.disabled = true;
                if (info) info.textContent = 'Добавьте путь для сканирования или загрузки';
                return;
            }
            
            var html = '';
            pathsToScan.forEach(function(p) {
                var escapedPath = p.replace(/\\/g, '\\\\');
                html += '<span class="path-tag">' +
                    p +
                    '<span class="remove-path" onclick="removePath(\'' + escapedPath + '\')">&times;</span>' +
                '</span>';
            });
            if (container) container.innerHTML = html;
            if (scanBtn) scanBtn.disabled = false;
            if (loadBtn) loadBtn.disabled = false;
            if (info) info.textContent = 'Готово: ' + pathsToScan.length + ' путь(ей)';
        }

        document.getElementById('pathInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); addPath(); }
        });

        // ============================================================
        // API ВЫЗОВЫ
        // ============================================================

        function loadPaths() {
            fetch('/api/paths')
                .then(function(r) { return r.json(); })
                .then(function(paths) {
                    var container = document.getElementById('pathsList');
                    if (paths.length === 0) {
                        if (container) container.innerHTML = '<div class="text-center text-muted py-4"><i class="bi bi-inbox" style="font-size:2rem;"></i><p class="mt-2">Нет сохраненных сканирований</p></div>';
                        return;
                    }
                    var html = '<div class="list-group">';
                    paths.slice(-5).forEach(function(p) {
                        var escapedPath = p.path.replace(/\\/g, '\\\\');
                        html += '<div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" onclick="openReport(\'' + escapedPath + '\')" style="cursor:pointer;">' +
                            '<div><i class="bi bi-folder"></i> <strong>' + p.path + '</strong></div>' +
                            '<span class="badge bg-primary">' + p.disk + '</span>' +
                        '</div>';
                    });
                    html += '</div>';
                    if (container) container.innerHTML = html;
                })
                .catch(function(e) { console.error('Ошибка:', e); });
        }

        function scanSinglePath(path) {
            var normalizedPath = normalizeUncPath(path);
            return fetch('/api/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: normalizedPath })
            })
            .then(function(response) {
                if (!response.ok) {
                    return response.json().then(function(err) { throw new Error(err.error || 'Ошибка сервера'); });
                }
                return response.json();
            })
            .then(function(data) {
                if (data.error) throw new Error(data.error);
                return data;
            });
        }

        function loadFromDB() {
            if (pathsToScan.length === 0) {
                showToast('Добавьте путь', 'warning');
                return;
            }
            
            var btn = document.getElementById('loadFromDbBtn');
            var progress = document.getElementById('scanProgress');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Загрузка...';
            }
            if (progress) progress.style.display = 'block';
            
            fetch('/api/load_from_db', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paths: pathsToScan })
            })
            .then(function(response) {
                if (!response.ok) {
                    return response.json().then(function(err) {
                        throw new Error(err.error || 'Ошибка сервера');
                    });
                }
                return response.json();
            })
            .then(function(data) {
                if (data.error) {
                    showToast('❌ ' + data.error, 'error');
                    return;
                }
                
                if (data.errors && data.errors.length > 0) {
                    data.errors.forEach(function(err) {
                        showToast('⚠️ ' + err.path + ': ' + err.error, 'warning');
                    });
                }
                
                if (data.results.length === 0) {
                    showToast('❌ Нет данных для загрузки', 'error');
                    return;
                }
                
                showToast('✅ Загружено из БД: ' + data.results.length + ' путей', 'success');
                loadPaths();
                showMultipleReports(data.results, 'db');
            })
            .catch(function(error) {
                console.error('❌ Ошибка:', error);
                showToast('❌ Ошибка загрузки: ' + error.message, 'error');
            })
            .finally(function() {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-database-fill"></i> Загрузить из БД';
                }
                if (progress) progress.style.display = 'none';
            });
        }

        document.getElementById('loadFromDbBtn').addEventListener('click', loadFromDB);

        function browseFromDB(path) {
            var normalizedPath = normalizeUncPath(path);
            return fetch('/api/browse_from_db', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: normalizedPath })
            })
            .then(function(response) {
                if (!response.ok) {
                    return response.json().then(function(err) { throw new Error(err.error || 'Ошибка сервера'); });
                }
                return response.json();
            })
            .then(function(data) {
                if (data.error) throw new Error(data.error);
                return data;
            });
        }

        function getChartFromDB(path) {
            var normalizedPath = normalizeUncPath(path);
            return fetch('/api/parent_data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: normalizedPath })
            })
            .then(function(response) {
                if (!response.ok) {
                    return response.json().then(function(err) { throw new Error(err.error || 'Ошибка сервера'); });
                }
                return response.json();
            })
            .then(function(data) {
                if (data.error) throw new Error(data.error);
                return data;
            });
        }

        // ============================================================
        // РЕНДЕРИНГ ГРАФИКОВ
        // ============================================================

        function renderChart(chartData, divId, pathId) {
            var div = document.getElementById(divId);
            if (!div) return;
            
            if (!chartData) {
                div.innerHTML = '';
                return;
            }
            
            try {
                var data = typeof chartData === 'string' ? JSON.parse(chartData) : chartData;
                
                if (data && data.data && Array.isArray(data.data) && data.data.length > 0) {
                    var plotId = div.id || divId;
                    Plotly.purge(plotId);
                    
                    var traces = data.data;
                    
                    traces.forEach(function(trace, index) {
                        if (trace.hovertemplate && trace.hovertemplate.indexOf('%{fullData.') !== -1) {
                            var folderName = trace.name || 'Папка ' + (index + 1);
                            trace.hovertemplate = trace.hovertemplate.replace(/%\{fullData\.[^}]+\}/g, folderName);
                        }
                        if (trace.hovertemplate && trace.hovertemplate.indexOf('%{fullData.fullName}') !== -1) {
                            var folderName = trace.name || 'Папка ' + (index + 1);
                            trace.hovertemplate = trace.hovertemplate.replace('%{fullData.fullName}', folderName);
                        }
                    });
                    
                    var layout = data.layout || {};
                    layout.height = 350;
                    layout.margin = { l: 50, r: 20, t: 40, b: 60 };
                    layout.responsive = true;
                    
                    Plotly.newPlot(plotId, traces, layout, { 
                        responsive: true,
                        displaylogo: false,
                        modeBarButtonsToRemove: ['toImage', 'sendDataToCloud']
                    });
                    return;
                }
            } catch (e) {
                console.log('📊 Ошибка парсинга графика:', e);
            }
            
            div.innerHTML = '';
        }

        function renderSectionedHistogram(chartData, divId, pathId) {
            var div = document.getElementById(divId);
            if (!div) {
                console.error('❌ Div для гистограммы не найден:', divId);
                return;
            }
            
            if (!chartData) {
                div.innerHTML = '';
                return;
            }
            
            try {
                var data = typeof chartData === 'string' ? JSON.parse(chartData) : chartData;
                
                if (data && data.data && Array.isArray(data.data) && data.data.length > 0) {
                    var plotId = div.id || divId;
                    Plotly.purge(plotId);
                    
                    var traces = data.data;
                    var layout = data.layout || {};
                    
                    traces.forEach(function(trace, index) {
                        trace.orientation = 'v';
                        trace.type = 'bar';
                        
                        if (!trace.width) {
                            trace.width = 0.95;
                        }
                        
                        if (!trace.textposition) {
                            trace.textposition = 'outside';
                        }
                        if (!trace.textfont) {
                            trace.textfont = { size: 8, color: '#2c3e50', weight: 'bold' };
                        }
                        
                        if (trace.hovertemplate) {
                            trace.hovertemplate = trace.hovertemplate.replace(/%\{fullData\.[^}]+\}/g, '%{customdata}');
                        }
                        
                        if (!trace.customdata && trace.name) {
                            var dataLen = trace.x ? trace.x.length : 0;
                            trace.customdata = Array(dataLen).fill(trace.name);
                        }
                        
                        if (!trace.marker) {
                            trace.marker = {};
                        }
                        if (!trace.marker.line) {
                            trace.marker.line = {
                                color: 'rgba(0,0,0,0.12)',
                                width: 0.5
                            };
                        }
                    });
                    
                    layout.barmode = 'group';
                    layout.bargap = 0.25;
                    layout.bargroupgap = 0.0;
                    
                    var folderCount = traces.length;
                    var calculatedHeight = 100 + folderCount * 210;
                    layout.height = Math.max(400, Math.min(1500, calculatedHeight));
                    
                    if (!layout.margin) {
                        layout.margin = { l: 80, r: 30, t: 80, b: 40 };
                    }
                    
                    if (layout.xaxis) {
                        layout.xaxis.tickangle = -90;
                        layout.xaxis.tickfont = layout.xaxis.tickfont || { size: 7 };
                    }
                    
                    for (var key in layout) {
                        if (key.startsWith('xaxis')) {
                            if (!layout[key].tickangle) {
                                layout[key].tickangle = -90;
                            }
                            if (!layout[key].tickfont) {
                                layout[key].tickfont = { size: 7 };
                            }
                        }
                    }
                    
                    if (!layout.legend) {
                        layout.legend = {};
                    }
                    layout.legend.orientation = 'v';
                    layout.legend.x = 1.02;
                    layout.legend.y = 1;
                    layout.legend.xanchor = 'left';
                    layout.legend.yanchor = 'top';
                    layout.legend.font = layout.legend.font || { size: 9, color: '#2c3e50' };
                    layout.legend.itemwidth = 30;
                    layout.legend.bgcolor = 'rgba(255,255,255,0.95)';
                    layout.legend.bordercolor = '#e0e0e0';
                    layout.legend.borderwidth = 1;
                    
                    layout.plot_bgcolor = layout.plot_bgcolor || '#ffffff';
                    layout.paper_bgcolor = layout.paper_bgcolor || '#ffffff';
                    layout.dragmode = false;
                    
                    Plotly.newPlot(plotId, traces, layout, { 
                        responsive: true,
                        displaylogo: false,
                        modeBarButtonsToRemove: ['toImage', 'sendDataToCloud', 'zoom2d', 'pan2d', 'select2d', 'lasso2d', 'zoomIn2d', 'zoomOut2d', 'autoScale2d', 'resetScale2d']
                    });
                    
                    var wrapper = div.parentElement;
                    if (wrapper) {
                        wrapper.style.overflowY = 'auto';
                        wrapper.style.maxHeight = '650px';
                        wrapper.style.overflowX = 'auto';
                        wrapper.style.scrollBehavior = 'smooth';
                        wrapper.style.width = '100%';
                    }
                    
                    return;
                }
            } catch (e) {
                console.log('📊 Ошибка парсинга гистограммы:', e);
            }
            
            div.innerHTML = '';
        }

        // ============================================================
        // ФУНКЦИЯ ЗАГРУЗКИ ГРАФИКОВ ИЗ БД
        // ============================================================

        function loadChartsFromDB(pathId, path) {
            console.log('🔄 Загрузка графиков из БД для:', pathId, path);
            
            var store = multipleDataStore[pathId];
            if (!store) {
                console.error('❌ Store не найден для pathId:', pathId);
                return;
            }
            
            getChartFromDB(path)
                .then(function(data) {
                    console.log('📊 Получены данные из БД для:', path);
                    
                    if (data.scans_count > 0) {
                        store.scansCount = data.scans_count;
                    }
                    
                    if (data.chart) {
                        renderChart(data.chart, 'level1ChartDiv_' + pathId, pathId);
                    }
                    
                    if (data.sectioned_histogram) {
                        renderSectionedHistogram(data.sectioned_histogram, 'level1HistogramDiv_' + pathId, pathId);
                    }
                    
                    var level2Section = document.getElementById('level2Section_' + pathId);
                    if (level2Section && level2Section.classList.contains('active')) {
                        var currentPath = store.currentPath;
                        if (currentPath && currentPath !== path) {
                            console.log('📊 Загрузка данных для уровня 2:', currentPath);
                            
                            getChartFromDB(currentPath)
                                .then(function(data2) {
                                    console.log('📊 Получены данные уровня 2 для:', currentPath);
                                    
                                    if (data2.chart) {
                                        renderChart(data2.chart, 'level2ChartDiv_' + pathId, pathId);
                                    }
                                    
                                    if (data2.sectioned_histogram) {
                                        renderSectionedHistogram(data2.sectioned_histogram, 'level2HistogramDiv_' + pathId, pathId);
                                    }
                                    
                                    if (data2.folders && data2.folders.length > 0) {
                                        store.items = data2.folders;
                                    }
                                })
                                .catch(function(e) {
                                    console.error('❌ Ошибка загрузки уровня 2:', e);
                                });
                        }
                    }
                    
                    updateAccordionHeader(pathId);
                    showToast('📊 Графики обновлены из БД', 'success');
                })
                .catch(function(e) {
                    console.error('❌ Ошибка загрузки графиков:', e);
                    showToast('❌ Ошибка загрузки графиков: ' + e.message, 'error');
                });
        }

        // БОКОВАЯ ПАНЕЛЬ
        // ============================================================

        function buildFolderTree(pathId, folders, rootPath, currentPath, level) {
            var container = document.getElementById('folderTreeContainer_' + pathId);
            if (!container) {
                var mainContainer = document.getElementById('folderTreeContainer');
                if (!mainContainer) return;
                
                var section = document.createElement('div');
                section.id = 'folderTreeSection_' + pathId;
                section.className = 'folder-tree-section';
                
                var header = document.createElement('div');
                header.className = 'folder-tree-header';
                header.innerHTML = `
                    <span><i class="bi bi-folder"></i> <span class="path-text" title="${rootPath}">${rootPath}</span></span>
                    <span class="badge bg-secondary">${folders ? folders.length : 0}</span>
                `;
                section.appendChild(header);
                
                var treeContainer = document.createElement('div');
                treeContainer.id = 'folderTreeContainer_' + pathId;
                treeContainer.className = 'folder-tree-content';
                section.appendChild(treeContainer);
                
                mainContainer.appendChild(section);
                container = treeContainer;
            }
            
            if (!folders || folders.length === 0) {
                container.innerHTML = `
                    <div class="empty-sidebar" style="padding:8px;font-size:0.8rem;color:#6c757d;">
                        <i class="bi bi-folder" style="font-size:1.2rem;display:block;margin-bottom:4px;"></i>
                        Нет папок
                    </div>
                `;
                return;
            }
            
            var sortedFolders = [...folders].sort(function(a, b) {
                return (b.size || b.size_bytes || 0) - (a.size || a.size_bytes || 0);
            });
            
            var html = '<ul class="folder-tree" style="list-style:none;padding:0;margin:0;">';
            
            sortedFolders.forEach(function(f) {
                var folderPath = rootPath + '\\' + f.name;
                var isActive = (folderPath === currentPath);
                var sizeStr = f.size_str || formatSize(f.size || f.size_bytes || 0);
                var levelClass = level === 0 ? 'level1' : 'level2';
                var levelLabel = level === 0 ? 'L1' : 'L2';
                var iconColor = level === 0 ? '#fd7e14' : '#0d6efd';
                
                html += `
                    <li style="padding:0;">
                        <div class="folder-item ${isActive ? 'active' : ''}" 
                             onclick="browseFolderFromSidebar('${pathId}', '${encodeURIComponent(folderPath)}')"
                             title="${f.name}"
                             style="display:flex;align-items:center;padding:3px 8px;border-radius:4px;cursor:pointer;transition:background 0.15s;font-size:0.82rem;gap:6px;${isActive ? 'background:#cce5ff;font-weight:600;' : ''}">
                            <i class="bi bi-folder folder-icon" style="color:${iconColor};font-size:0.85rem;"></i>
                            <span class="folder-name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span>
                            <span class="level-badge-sm ${levelClass}" style="font-size:0.55rem;padding:1px 6px;border-radius:10px;background:${level === 0 ? '#fd7e14' : '#0d6efd'};color:white;">${levelLabel}</span>
                            <span class="folder-size" style="font-size:0.65rem;color:#6c757d;background:#f1f3f5;padding:1px 6px;border-radius:10px;">${sizeStr}</span>
                        </div>
                    </li>
                `;
            });
            
            html += '</ul>';
            container.innerHTML = html;
            
            var section = document.getElementById('folderTreeSection_' + pathId);
            if (section) {
                var header = section.querySelector('.folder-tree-header');
                if (header) {
                    var badge = header.querySelector('.badge');
                    if (badge) {
                        badge.textContent = folders.length;
                    }
                }
            }
        }

        function updateSidebar() {
            var container = document.getElementById('folderTreeContainer');
            if (!container) return;
            
            container.innerHTML = '';
            
            var totalFolders = 0;
            var pathIds = Object.keys(multipleDataStore);
            
            if (pathIds.length === 0) {
                container.innerHTML = `
                    <div class="empty-sidebar">
                        <i class="bi bi-folder" style="font-size:2rem;display:block;margin-bottom:10px;"></i>
                        Нет папок для отображения
                    </div>
                `;
                var badge = document.getElementById('folderCountBadge');
                if (badge) badge.textContent = '0';
                return;
            }
            
            pathIds.sort();
            
            pathIds.forEach(function(pathId) {
                var store = multipleDataStore[pathId];
                if (!store) return;
                
                var folders = store.baseFolders || [];
                var rootPath = store.rootPath || '';
                var currentPath = store.currentPath || rootPath;
                
                var section = document.createElement('div');
                section.id = 'folderTreeSection_' + pathId;
                section.className = 'folder-tree-section';
                
                var header = document.createElement('div');
                header.className = 'folder-tree-header';
                header.innerHTML = `
                    <span><i class="bi bi-folder"></i> <span class="path-text" title="${rootPath}">${rootPath}</span></span>
                    <span class="badge bg-secondary">${folders ? folders.length : 0}</span>
                `;
                section.appendChild(header);
                
                var treeContainer = document.createElement('div');
                treeContainer.id = 'folderTreeContainer_' + pathId;
                treeContainer.className = 'folder-tree-content';
                section.appendChild(treeContainer);
                
                container.appendChild(section);
                
                buildFolderTree(pathId, folders, rootPath, currentPath, 0);
                
                totalFolders += folders ? folders.length : 0;
            });
            
            var badge = document.getElementById('folderCountBadge');
            if (badge) badge.textContent = totalFolders;
        }

        function browseFolderFromSidebar(pathId, encodedPath) {
            var path = decodeURIComponent(encodedPath);
            console.log('📂 Переход из сайдбара:', pathId, path);
            browseFolderMultipleDB(pathId, path);
        }

        // ============================================================
        // РЕНДЕРИНГ СПИСКОВ ПАПОК
        // ============================================================

        function buildNavigationHTML(pathId, currentPathName, rootPath, level) {
            var store = multipleDataStore[pathId];
            if (!store) return '';
            
            var parts = currentPathName.split('\\');
            var html = '';
            
            if (store.history && store.history.length > 0) {
                html += '<button class="btn-back" onclick="goBackMultiple(\'' + pathId + '\')"><i class="bi bi-arrow-left"></i> Назад</button>';
            }
            
            if (currentPathName !== rootPath && rootPath) {
                if (html) html += '<span class="nav-separator">|</span>';
                html += '<button class="btn-home" onclick="goHomeMultiple(\'' + pathId + '\')"><i class="bi bi-house"></i> Главная</button>';
            }
            
            if (html) html += '<span class="nav-separator">|</span>';
            html += '<button class="btn btn-sm btn-outline-primary" onclick="loadChartsFromDB(\'' + pathId + '\', \'' + encodeURIComponent(currentPathName) + '\')" style="font-size:0.75rem;padding:2px 8px;">';
            html += '<i class="bi bi-arrow-repeat"></i> Обновить графики</button>';
            
            html += '<span class="nav-separator">|</span>';
            var levelText = level === 0 ? 'Уровень 1' : 'Уровень 2';
            html += '<button class="btn btn-sm btn-success" onclick="exportExcelForPath(\'' + pathId + '\', \'' + encodeURIComponent(currentPathName) + '\')" style="font-size:0.75rem;padding:2px 10px;">';
            html += '<i class="bi bi-file-earmark-excel"></i> Excel (' + levelText + ')</button>';
            
            if (parts.length > 1) {
                if (html) html += '<span class="nav-separator">|</span>';
                html += '<nav aria-label="breadcrumb" style="display:inline-block;">';
                html += '<ol class="breadcrumb-nav">';
                var currentPath = '';
                parts.forEach(function(part, i) {
                    if (part) {
                        currentPath += (i === 0 ? part : '\\' + part);
                        if (i === parts.length - 1) {
                            html += '<li class="breadcrumb-item active">' + part + '</li>';
                        } else {
                            var encoded = encodeURIComponent(currentPath);
                            html += '<li class="breadcrumb-item"><a onclick="navigateMultiplePathDB(\'' + pathId + '\', decodeURIComponent(\'' + encoded + '\'))">' + part + '</a></li>';
                        }
                    }
                });
                html += '</ol>';
                html += '</nav>';
            }
            
            if (!html) {
                html = '<span class="nav-empty"><i class="bi bi-house"></i> Корневой уровень</span>';
            }
            
            return html;
        }

        function renderFolderListLevel1(pathId, folders, basePath, currentPathName, rootPath) {
            var container = document.getElementById('itemsContainerLevel1_' + pathId);
            if (!container) return;
            
            var navContainer = document.getElementById('navContainerLevel1_' + pathId);
            if (navContainer) {
                navContainer.innerHTML = buildNavigationHTML(pathId, currentPathName, rootPath, 0);
            }
            
            if (!folders || folders.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-3"><i class="bi bi-folder" style="font-size:1.5rem;"></i><p class="mt-1" style="font-size:0.9rem;">Нет папок</p></div>';
                return;
            }
            
            var html = '<div class="list-group">';
            folders.forEach(function(f) {
                var escapedPath = encodeURIComponent(basePath + '\\' + f.name);
                html += `
                    <div class="list-group-item d-flex justify-content-between align-items-center folder-clickable" 
                         onclick="browseFolderMultipleDB('${pathId}', decodeURIComponent('${escapedPath}'))">
                        <div>
                            <i class="bi bi-folder" style="color:#fd7e14;margin-right:8px;"></i>
                            <strong>${f.name}</strong>
                            <i class="bi bi-chevron-right" style="font-size:0.7rem;color:#6c757d;margin-left:4px;"></i>
                        </div>
                        <span class="badge bg-secondary">${f.size_str || formatSize(f.size)}</span>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
            
            buildFolderTree(pathId, folders, rootPath, currentPathName, 0);

        function renderFolderListLevel2(pathId, folders, basePath, currentPathName, rootPath) {
            var container = document.getElementById('itemsContainerLevel2_' + pathId);
            if (!container) {
                console.warn('⚠️ itemsContainerLevel2_' + pathId + ' не найден');
                return;
            }
            
            var navContainer = document.getElementById('navContainerLevel2_' + pathId);
            if (navContainer) {
                navContainer.innerHTML = buildNavigationHTML(pathId, currentPathName, rootPath, 1);
            }
            
            if (!folders || folders.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-3"><i class="bi bi-folder" style="font-size:1.5rem;"></i><p class="mt-1" style="font-size:0.9rem;">Нет папок</p></div>';
                return;
            }
            
            var html = '<div class="list-group">';
            folders.forEach(function(f) {
                html += `
                    <div class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <i class="bi bi-folder" style="color:#0d6efd;margin-right:8px;"></i>
                            <strong>${f.name}</strong>
                        </div>
                        <span class="badge bg-secondary">${f.size_str || formatSize(f.size)}</span>
                    </div>
