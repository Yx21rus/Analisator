<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализатор размера папок v.1.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background: #f0f2f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 0;
        }
        
        .container-fluid-custom {
            max-width: 100%;
            padding: 0 20px;
            margin: 0 auto;
        }
        
        .navbar {
            padding: 8px 20px;
        }
        
        .folder-clickable { cursor: pointer; transition: background 0.2s; }
        .folder-clickable:hover { background: #e8f4fd; }
        
        .btn-back { background: #28a745; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
        .btn-back:hover { background: #218838; }
        .btn-back i { margin-right: 4px; }
        
        .btn-home { background: #007bff; color: white; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
        .btn-home:hover { background: #0069d9; }
        .btn-home i { margin-right: 4px; }
        
        .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 9999; display: none; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast-custom { background: white; border-radius: 10px; padding: 12px 20px; margin-bottom: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); border-left: 4px solid #0d6efd; min-width: 250px; }
        
        .path-tag { display: inline-block; background: #e9ecef; padding: 4px 12px; border-radius: 15px; margin: 4px; font-size: 0.9rem; }
        .path-tag .remove-path { cursor: pointer; margin-left: 8px; color: #dc3545; font-weight: bold; }
        .empty-paths { color: #6c757d; font-style: italic; margin: 8px 0; }
        
        .top-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .top-panel .scan-card {
            flex: 0 0 380px;
            min-width: 320px;
        }
        .top-panel .history-card {
            flex: 1;
            min-width: 0;
        }
        
        @media (max-width: 992px) {
            .top-panel {
                flex-direction: column;
            }
            .top-panel .scan-card {
                flex: 1;
                width: 100%;
            }
        }
        
        .stat-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .stat-row .stat-item { flex: 1; min-width: 80px; background: #f8f9fa; border-radius: 6px; padding: 8px; text-align: center; }
        .stat-row .stat-item .value { font-size: 1.1rem; font-weight: bold; color: #0d6efd; }
        .stat-row .stat-item .label { font-size: 0.7rem; color: #6c757d; }
        
        .level-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 15px; }
        
        .chart-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            margin-bottom: 15px;
        }
        .chart-section .section-title {
            font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 2px solid #0d6efd; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .chart-section .section-title .path-text { font-weight: 400; color: #6c757d; font-size: 0.8rem; word-break: break-all; }
        .chart-section .chart-card { background: white; border-radius: 6px; padding: 12px; border: 1px solid #e9ecef; margin-bottom: 8px; }
        .chart-section .chart-card:last-child { margin-bottom: 0; }
        .chart-section .chart-card h6 { color: #0d6efd; font-size: 0.9rem; margin-bottom: 8px; }
        .chart-section .chart-card .chart-wrapper { width: 100%; min-height: 250px; overflow: visible; }
        .chart-section .chart-card .chart-wrapper .plotly-graph-div { width: 100% !important; height: 450px !important; }
        
        .chart-section.level-1 { border-color: #fd7e14; }
        .chart-section.level-1 .section-title { border-bottom-color: #fd7e14; }
        .chart-section.level-1 .section-title .badge { background: #fd7e14; color: white; }
        .chart-section.level-1 .chart-card h6 { color: #fd7e14; }
        
        .chart-section.level-2 { border-color: #0d6efd; }
        .chart-section.level-2 .section-title { border-bottom-color: #0d6efd; }
        .chart-section.level-2 .section-title .badge { background: #0d6efd; color: white; }
        .chart-section.level-2 .chart-card h6 { color: #0d6efd; }
        
        .report-card { margin-bottom: 20px; border-left: 4px solid #0d6efd; }
        .report-card .card-header { background: #f8f9fa; font-weight: bold; }
        
        .level-divider { border: none; border-top: 2px dashed #6c757d; margin: 15px 0; opacity: 0.5; }
        .level-2-section { display: none; }
        .level-2-section.active { display: block; }
        
        .folders-section {
            background: #f8f9fa; border-radius: 6px; padding: 10px; border: 1px solid #e9ecef; margin-top: 8px;
        }
        .folders-section .folders-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
        }
        .folders-section .folders-header h6 { margin: 0; font-size: 0.9rem; }
        .folders-section .folders-nav { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .folders-section .list-group-item { border-left: 3px solid #fd7e14; padding: 6px 12px; font-size: 0.9rem; }
        .folders-section.level-2 .list-group-item { border-left-color: #0d6efd; }
        .folders-section .list-group-item .badge { font-size: 0.75rem; }
        
        .nav-empty { color: #6c757d; font-size: 0.8rem; font-style: italic; }
        .breadcrumb-nav { font-size: 0.8rem; margin: 0; padding: 0; background: transparent; display: inline-flex; flex-wrap: wrap; align-items: center; }
        .breadcrumb-nav .breadcrumb-item { font-size: 0.8rem; display: inline-flex; align-items: center; }
        .breadcrumb-nav .breadcrumb-item a { color: #007bff; text-decoration: none; cursor: pointer; }
        .breadcrumb-nav .breadcrumb-item a:hover { text-decoration: underline; }
        .breadcrumb-nav .breadcrumb-item.active { color: #495057; }
        .breadcrumb-nav .breadcrumb-item + .breadcrumb-item::before { content: "›"; color: #adb5bd; padding: 0 4px; }
        
        .nav-separator { color: #dee2e6; margin: 0 4px; }
        
        .layout-wrapper {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            min-height: 600px;
        }
        
        .sidebar {
            width: 380px;
            min-width: 320px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            background: white;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            padding: 12px;
            position: sticky;
            top: 20px;
        }
        
        .sidebar .sidebar-header {
            font-size: 0.9rem; font-weight: 600; color: #495057; padding-bottom: 8px; border-bottom: 2px solid #0d6efd; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 10;
        }
        .sidebar .sidebar-header .badge { font-size: 0.7rem; }
        
        .sidebar .folder-tree-section {
            margin-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }
        .sidebar .folder-tree-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        .sidebar .folder-tree-header {
            font-size: 0.7rem;
            font-weight: 600;
            color: #495057;
            padding: 4px 0 6px 0;
            border-bottom: 2px solid #0d6efd;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .sidebar .folder-tree-header:hover {
            background: #f8f9fa;
        }
        .sidebar .folder-tree-header .badge {
            font-size: 0.6rem;
        }
        .sidebar .folder-tree-header .path-text {
            font-weight: 400;
            font-size: 0.65rem;
            color: #6c757d;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 220px;
        }
        
        .sidebar .folder-tree { list-style: none; padding: 0; margin: 0; }
        .sidebar .folder-tree li { padding: 0; }
        .sidebar .folder-tree .folder-item {
            display: flex; align-items: center; padding: 3px 8px; border-radius: 4px; cursor: pointer; transition: background 0.15s; font-size: 0.82rem; gap: 6px;
        }
        .sidebar .folder-tree .folder-item:hover { background: #e8f4fd; }
        .sidebar .folder-tree .folder-item.active { background: #cce5ff; font-weight: 600; }
        .sidebar .folder-tree .folder-item .folder-icon { color: #fd7e14; font-size: 0.85rem; }
        .sidebar .folder-tree .folder-item .folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar .folder-tree .folder-item .folder-size { font-size: 0.65rem; color: #6c757d; background: #f1f3f5; padding: 1px 6px; border-radius: 10px; }
        .sidebar .folder-tree .folder-item .level-badge-sm { font-size: 0.55rem; padding: 1px 6px; border-radius: 10px; background: #e9ecef; color: #495057; }
        .sidebar .folder-tree .folder-item .level-badge-sm.level1 { background: #fd7e14; color: white; }
        .sidebar .folder-tree .folder-item .level-badge-sm.level2 { background: #0d6efd; color: white; }
        
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 3px; }
        .sidebar::-webkit-scrollbar-thumb { background: #c1c7cd; border-radius: 3px; }
        .sidebar::-webkit-scrollbar-thumb:hover { background: #a8b0b8; }
        
        .main-content { flex: 1; min-width: 0; }
        
        .empty-sidebar {
            padding: 10px;
            text-align: center;
            color: #6c757d;
            font-size: 0.85rem;
        }
        
        .history-list .list-group-item {
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        .history-list .list-group-item .badge {
            font-size: 0.7rem;
        }
        
        @media (max-width: 992px) {
            .layout-wrapper { flex-direction: column; }
            .sidebar { width: 100%; max-height: 300px; position: relative; top: 0; }
            .top-panel .scan-card {
                flex: 1;
                width: 100%;
            }
        }

        @media (min-width: 1600px) {
            .sidebar {
                width: 420px;
                min-width: 360px;
            }
            .sidebar .folder-tree-header .path-text {
                max-width: 260px;
            }
            .top-panel .scan-card {
                flex: 0 0 420px;
            }
        }

        /* ============================================================
           ПАСХАЛКА - ЭПИЧНЫЙ ВЗРЫВ "ЖАХ!"
           ============================================================ */
        
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            animation: flash 0.3s ease-out forwards;
        }
        @keyframes flash {
            0% { opacity: 0.9; }
            50% { opacity: 0.5; }
            100% { opacity: 0; }
        }
        
        .shockwave {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 200, 50, 0.3);
            z-index: 9998;
            pointer-events: none;
            animation: shockwave 1s ease-out forwards;
        }
        @keyframes shockwave {
            0% { width: 0; height: 0; opacity: 0.8; transform: translate(-50%, -50%); }
            100% { width: 200vw; height: 200vw; opacity: 0; transform: translate(-50%, -50%); }
        }
        
        .explosion-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
            overflow: hidden;
        }
        
        .explosion-particle {
            position: absolute;
            border-radius: 50%;
            animation: explode 1.5s ease-out forwards;
            opacity: 1;
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(720deg); opacity: 0; }
        }
        
        .star-particle {
            position: absolute;
            color: #ffd700;
            font-size: 2rem;
            animation: starExplode 1.8s ease-out forwards;
            pointer-events: none;
        }
        @keyframes starExplode {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
            50% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: translate(var(--tx2), var(--ty2)) scale(0) rotate(360deg); opacity: 0; }
        }
        
        .explosion-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 900;
            color: #ff4757;
            text-shadow: 
                0 0 20px rgba(255, 71, 87, 0.8),
                0 0 40px rgba(255, 71, 87, 0.6),
                0 0 80px rgba(255, 71, 87, 0.4),
                0 0 120px rgba(255, 71, 87, 0.2),
                4px 4px 0 #c0392b,
                8px 8px 0 rgba(0,0,0,0.2);
            font-family: 'Impact', 'Arial Black', sans-serif;
            z-index: 10001;
            animation: boomText 1.8s ease-out forwards;
            pointer-events: none;
            letter-spacing: 15px;
        }
        @keyframes boomText {
            0% { transform: translate(-50%, -50%) scale(0.2) rotate(-15deg); opacity: 0; text-shadow: none; }
            20% { transform: translate(-50%, -50%) scale(2) rotate(5deg); opacity: 1; }
            40% { transform: translate(-50%, -50%) scale(1.3) rotate(-3deg); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1.1) rotate(1deg); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1.05) rotate(0deg); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
        }
        
        .shake { animation: epicShake 0.8s ease-in-out; }
        @keyframes epicShake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            5% { transform: translateX(-20px) rotate(-2deg); }
            15% { transform: translateX(25px) rotate(3deg); }
            25% { transform: translateX(-15px) rotate(-1.5deg); }
            35% { transform: translateX(15px) rotate(1.5deg); }
            45% { transform: translateX(-8px) rotate(-0.8deg); }
            55% { transform: translateX(8px) rotate(0.8deg); }
            65% { transform: translateX(-4px) rotate(-0.4deg); }
            75% { transform: translateX(4px) rotate(0.4deg); }
            85% { transform: translateX(-2px) rotate(-0.2deg); }
            95% { transform: translateX(2px) rotate(0.2deg); }
        }
        
        .confetti-piece {
            position: fixed;
            z-index: 10002;
            pointer-events: none;
            animation: confettiFall 3.5s ease-out forwards;
            border-radius: 2px;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-50px) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(calc(100vh + 100px)) rotate(1080deg) scale(0); opacity: 0; }
        }
        
        .spark {
            position: fixed;
            z-index: 10000;
            pointer-events: none;
            width: 4px;
            height: 4px;
            background: #ffd700;
            border-radius: 50%;
            animation: sparkFly 1.2s ease-out forwards;
            box-shadow: 0 0 10px #ffd700, 0 0 20px #ff6b00;
        }
        @keyframes sparkFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
        }
        
        .fire-particle {
            position: absolute;
            border-radius: 50%;
            animation: fireRise 1.2s ease-out forwards;
            pointer-events: none;
        }
        @keyframes fireRise {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--fx), var(--fy)) scale(0); opacity: 0; }
        }

        /* Стили для контейнера гистограммы с вертикальным скроллом */
        .histogram-wrapper-scroll {
            overflow-y: auto;
            max-height: 650px;
            overflow-x: hidden;
            padding-right: 5px;
        }
        
        .histogram-wrapper-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .histogram-wrapper-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .histogram-wrapper-scroll::-webkit-scrollbar-thumb {
            background: #c1c7cd;
            border-radius: 4px;
        }
        .histogram-wrapper-scroll::-webkit-scrollbar-thumb:hover {
            background: #a8b0b8;
        }
        
        .histogram-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
            background: white;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            padding: 5px 0;
        }
        .histogram-scroll-wrapper::-webkit-scrollbar {
            height: 12px;
            background: #f1f1f1;
            border-radius: 6px;
        }
        .histogram-scroll-wrapper::-webkit-scrollbar-thumb {
            background: #c1c7cd;
            border-radius: 6px;
        }
        .histogram-scroll-wrapper::-webkit-scrollbar-thumb:hover {
            background: #a8b0b8;
        }
        .histogram-scroll-wrapper .histogram-inner {
            min-width: 100%;
            width: auto;
            padding: 5px 0;
            display: inline-block;
        }
        .histogram-scroll-wrapper .histogram-inner .plotly-graph-div {
            width: 100% !important;
            height: 450px !important;
            min-width: 800px;
        }
        
        .scroll-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            font-size: 0.75rem;
            color: #495057;
            background: #f8f9fa;
            border-radius: 0 0 8px 8px;
            border-top: 1px solid #e9ecef;
            flex-wrap: wrap;
            gap: 6px;
        }
        .scroll-indicator .scroll-arrow {
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 4px;
            user-select: none;
            background: #e9ecef;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }
        .scroll-indicator .scroll-arrow:hover {
            background: #dee2e6 !important;
            transform: scale(1.05);
        }
        .scroll-indicator .badge {
            font-size: 0.6rem;
            padding: 2px 8px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid-custom">
            <span class="navbar-brand"><i class="bi bi-folder2-open"></i> Анализатор размера папок</span>
            <span class="text-white-50"><i class="bi bi-database"></i> PostgreSQL</span>
        </div>
    </nav>

    <div class="container-fluid-custom mt-3">
        <div class="top-panel">
            <div class="card scan-card">
                <div class="card-header bg-primary text-white"><i class="bi bi-search"></i> Сканировать</div>
                <div class="card-body">
                    <form id="scanForm">
                        <div class="mb-3">
                            <label class="form-label">Добавить путь</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="pathInput" 
                                       placeholder="Например: C:\Users или \\server\share" value="">
                                <button class="btn btn-outline-secondary" type="button" onclick="addPath()">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div id="pathTags" class="mb-3"><div class="empty-paths">Нет добавленных путей</div></div>
                        <button type="submit" class="btn btn-primary w-100" id="scanBtn" disabled>
                            <i class="bi bi-play-fill"></i> Сканировать все пути
                        </button>
                        <small class="text-muted d-block mt-2" id="pathCountInfo">Добавьте путь для сканирования</small>
                    </form>
                    <div id="scanProgress" class="mt-3" style="display:none;">
                        <div class="progress"><div class="progress-bar progress-bar-striped progress-bar-animated" style="width:100%">Сканирование...</div></div>
                    </div>
                </div>
            </div>

            <div class="card history-card">
                <div class="card-header bg-success text-white"><i class="bi bi-clock-history"></i> История сканирований</div>
                <div class="card-body history-list" id="pathsList">
                    <div class="text-center text-muted py-4"><i class="bi bi-inbox" style="font-size:2rem;"></i><p class="mt-2">Нет сохраненных сканирований</p></div>
                </div>
            </div>
        </div>

        <div id="reportSection" class="mt-3" style="display:none;">
            <div class="layout-wrapper">
                <div class="sidebar" id="sidebarPanel">
                    <div class="sidebar-header">
                        <span><i class="bi bi-list-ul"></i> Содержание</span>
                        <span class="badge bg-secondary" id="folderCountBadge">0</span>
                    </div>
                    <div id="folderTreeContainer">
                        <div class="empty-sidebar">
                            <i class="bi bi-folder" style="font-size:2rem;display:block;margin-bottom:10px;"></i>
                            Нет папок для отображения
                        </div>
                    </div>
                </div>
                <div class="main-content" id="mainContent"></div>
            </div>
        </div>
    </div>

    <div class="loading" id="loading"><div class="spinner-border text-primary" role="status"></div><p class="mt-3">Загрузка данных...</p></div>
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script>
        // ============================================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        var pathsToScan = [];
        var multipleDataStore = {};
        var currentPathId = null;

        // ============================================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ

        function formatSize(bytes) {
            if (!bytes) return '0 Б';
            if (bytes >= 1024**3) return (bytes / (1024**3)).toFixed(2) + ' ГБ';
            if (bytes >= 1024**2) return (bytes / (1024**2)).toFixed(2) + ' МБ';
            if (bytes >= 1024) return (bytes / 1024).toFixed(2) + ' КБ';
            return bytes + ' Б';
        }

        function showToast(message, type) {
            type = type || 'info';
            var container = document.getElementById('toastContainer');
            var colors = { success: '#2ECC71', error: '#E74C3C', warning: '#F39C12', info: '#0d6efd' };
            var toast = document.createElement('div');
            toast.className = 'toast-custom';
            toast.style.borderLeftColor = colors[type] || colors.info;
            toast.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <span>${message}</span>
                    <button class="btn btn-sm btn-link text-dark" onclick="this.parentElement.parentElement.remove()">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(function() {
                if (toast.parentElement) {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100px)';
                    setTimeout(function() { toast.remove(); }, 300);
                }
            }, 4000);
        }

        function normalizeUncPath(path) {
            if (!path) return path;
            path = path.trim();
            if (path.startsWith('\\') && !path.startsWith('\\\\')) {
                path = '\\' + path;
            }
            path = path.replace(/\\\\\\\\/g, '\\\\');
            path = path.replace(/\\\\\\/g, '\\\\');
            if (path.startsWith('\\\\')) {
                var parts = path.split('\\').filter(function(p) { return p !== ''; });
                if (parts.length >= 2) {
                    var server = parts[0];
                    var share = parts[1];
                    var rest = parts.slice(2).join('\\');
                    if (rest) {
                        path = '\\\\' + server + '\\' + share + '\\' + rest;
                    } else {
                        path = '\\\\' + server + '\\' + share;
                    }
                }
            }
            return path;
        }

        // ============================================================
        // УПРАВЛЕНИЕ ПУТЯМИ
        // ============================================================

        function addPath() {
            var input = document.getElementById('pathInput');
            var path = input.value.trim();
            if (!path) { showToast('Введите путь', 'warning'); return; }
            path = normalizeUncPath(path);
            if (pathsToScan.indexOf(path) !== -1) { showToast('Путь уже добавлен', 'warning'); return; }
            pathsToScan.push(path);
            input.value = '';
            updatePathTags();
            showToast('Добавлен путь: ' + path, 'success');
        }

        function removePath(path) {
            pathsToScan = pathsToScan.filter(function(p) { return p !== path; });
            updatePathTags();
        }

        function updatePathTags() {
            var container = document.getElementById('pathTags');
            var btn = document.getElementById('scanBtn');
            var info = document.getElementById('pathCountInfo');
            if (pathsToScan.length === 0) {
                container.innerHTML = '<div class="empty-paths">Нет добавленных путей</div>';
                btn.disabled = true;
                info.textContent = 'Добавьте путь для сканирования';
                return;
            }
            var html = '';
            pathsToScan.forEach(function(p) {
                var escapedPath = p.replace(/\\/g, '\\\\');
                html += '<span class="path-tag">' +
                    p +
                    '<span class="remove-path" onclick="removePath(\'' + escapedPath + '\')">&times;</span>' +
                '</span>';
            });
            container.innerHTML = html;
            btn.disabled = false;
            info.textContent = 'Готово: ' + pathsToScan.length + ' путь(ей)';
        }

        document.getElementById('pathInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); addPath(); }
        });

            try {

                if (data && data.data && Array.isArray(data.data)) {
                    var plotId = div.id || divId;
                    Plotly.purge(plotId);
                    
                    var traces = data.data;
                    
                    traces.forEach(function(trace, index) {

        function renderSectionedHistogram(chartData, divId, pathId) {
    var div = document.getElementById(divId);
    if (!div) {
        console.error('❌ Div для гистограммы не найден:', divId);
        return;
    }
    
    if (!chartData) {
        div.innerHTML = `
            <div class="text-center text-muted py-3">
                <i class="bi bi-bar-chart" style="font-size:2rem;display:block;margin-bottom:6px;"></i>
                <p style="font-size:0.9rem;">Нет данных для гистограммы</p>
                <small>Нужно минимум 2 сканирования</small>
            </div>
        `;
        return;
    }
    
    try {
        var data = typeof chartData === 'string' ? JSON.parse(chartData) : chartData;
        
        if (data && data.data && Array.isArray(data.data)) {
            var plotId = div.id || divId;
            Plotly.purge(plotId);
            
            var traces = data.data;
            var layout = data.layout || {};
            
            traces.forEach(function(trace, index) {
                trace.orientation = 'v';
                trace.type = 'bar';
                
                if (!trace.width) {
                    trace.width = 0.95;
                }
                
                if (!trace.textposition) {
                    trace.textposition = 'outside';
                }
                if (!trace.textfont) {
                    trace.textfont = { size: 8, color: '#2c3e50', weight: 'bold' };
                }
                
                if (trace.hovertemplate) {
                    trace.hovertemplate = trace.hovertemplate.replace(/%\{fullData\.[^}]+\}/g, '%{customdata}');
                }
                
                if (!trace.customdata && trace.name) {
                    var dataLen = trace.x ? trace.x.length : 0;
                    trace.customdata = Array(dataLen).fill(trace.name);
                }
                
                // Тонкие разделительные линии между столбцами
                if (!trace.marker) {
                    trace.marker = {};
                }
                if (!trace.marker.line) {
                    trace.marker.line = {
                        color: 'rgba(0,0,0,0.12)',
                        width: 0.5
                    };
                }
            });
            
            layout.barmode = 'group';
            layout.bargap = 0.25;
            layout.bargroupgap = 0.0;
            
            var folderCount = traces.length;
            var calculatedHeight = 100 + folderCount * 210;
            layout.height = Math.max(400, Math.min(1500, calculatedHeight));
            
            if (!layout.margin) {
                layout.margin = { l: 80, r: 30, t: 80, b: 40 };
            }
            
            if (layout.xaxis) {
                layout.xaxis.tickangle = -90;
                layout.xaxis.tickfont = layout.xaxis.tickfont || { size: 7 };
            }
            
            for (var key in layout) {
                if (key.startsWith('xaxis')) {
                    if (!layout[key].tickangle) {
                        layout[key].tickangle = -90;
                    }
                    if (!layout[key].tickfont) {
                        layout[key].tickfont = { size: 7 };
                    }
                }
            }
            
            if (!layout.legend) {
                layout.legend = {};
            }
            layout.legend.orientation = 'v';
            layout.legend.x = 1.02;
            layout.legend.y = 1;
            layout.legend.xanchor = 'left';
            layout.legend.yanchor = 'top';
            layout.legend.font = layout.legend.font || { size: 9, color: '#2c3e50' };
            layout.legend.itemwidth = 30;
            layout.legend.bgcolor = 'rgba(255,255,255,0.95)';
            layout.legend.bordercolor = '#e0e0e0';
            layout.legend.borderwidth = 1;
            
            layout.plot_bgcolor = layout.plot_bgcolor || '#ffffff';
            layout.paper_bgcolor = layout.paper_bgcolor || '#ffffff';
            layout.dragmode = false;
            
            Plotly.newPlot(plotId, traces, layout, { 
                responsive: true,
                displaylogo: false,
                modeBarButtonsToRemove: ['toImage', 'sendDataToCloud', 'zoom2d', 'pan2d', 'select2d', 'lasso2d', 'zoomIn2d', 'zoomOut2d', 'autoScale2d', 'resetScale2d']
            });
            
            var wrapper = div.parentElement;
            if (wrapper) {
                wrapper.style.overflowY = 'auto';
                wrapper.style.maxHeight = '650px';
                wrapper.style.overflowX = 'auto';
                wrapper.style.scrollBehavior = 'smooth';
                wrapper.style.width = '100%';
            }
            
            return;
        }
    } catch (e) {
        console.log('📊 Ошибка парсинга гистограммы:', e);
    }
    
    div.innerHTML = `
        <div class="text-center text-muted py-3">
            <i class="bi bi-exclamation-triangle" style="font-size:2rem;display:block;margin-bottom:6px;color:#f39c12;"></i>
            <p style="font-size:0.9rem;">Не удалось загрузить гистограмму</p>
        </div>
    `;
}

        function buildFolderTree(pathId, folders, rootPath, currentPath, level) {
            var container = document.getElementById('folderTreeContainer_' + pathId);
            if (!container) {
                var mainContainer = document.getElementById('folderTreeContainer');
                if (!mainContainer) return;
                
                var section = document.createElement('div');
                section.id = 'folderTreeSection_' + pathId;
                section.className = 'folder-tree-section';
                
                var header = document.createElement('div');
                header.className = 'folder-tree-header';
                header.innerHTML = `
                    <span><i class="bi bi-folder"></i> <span class="path-text" title="${rootPath}">${rootPath}</span></span>
                    <span class="badge bg-secondary">${folders ? folders.length : 0}</span>
                `;
                section.appendChild(header);
                
                var treeContainer = document.createElement('div');
                treeContainer.id = 'folderTreeContainer_' + pathId;
                treeContainer.className = 'folder-tree-content';
                section.appendChild(treeContainer);
                
                mainContainer.appendChild(section);
                container = treeContainer;
            }
            
            if (!folders || folders.length === 0) {
                container.innerHTML = `
                    <div class="empty-sidebar" style="padding:8px;font-size:0.8rem;color:#6c757d;">
                        <i class="bi bi-folder" style="font-size:1.2rem;display:block;margin-bottom:4px;"></i>
                        Нет папок
                    </div>
                `;
                return;
            }
            
            var sortedFolders = [...folders].sort(function(a, b) {
                return (b.size || b.size_bytes || 0) - (a.size || a.size_bytes || 0);
            });
            
            var html = '<ul class="folder-tree" style="list-style:none;padding:0;margin:0;">';
            
            sortedFolders.forEach(function(f) {
                var folderPath = rootPath + '\\' + f.name;
                var isActive = (folderPath === currentPath);
                var sizeStr = f.size_str || formatSize(f.size || f.size_bytes || 0);
                var levelClass = level === 0 ? 'level1' : 'level2';
                var levelLabel = level === 0 ? 'L1' : 'L2';
                var iconColor = level === 0 ? '#fd7e14' : '#0d6efd';
                
                html += `
                    <li style="padding:0;">
                        <div class="folder-item ${isActive ? 'active' : ''}" 
                             onclick="browseFolderFromSidebar('${pathId}', '${encodeURIComponent(folderPath)}')"
                             title="${f.name}"
                             style="display:flex;align-items:center;padding:3px 8px;border-radius:4px;cursor:pointer;transition:background 0.15s;font-size:0.82rem;gap:6px;${isActive ? 'background:#cce5ff;font-weight:600;' : ''}">
                            <i class="bi bi-folder folder-icon" style="color:${iconColor};font-size:0.85rem;"></i>
                            <span class="folder-name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span>
                            <span class="level-badge-sm ${levelClass}" style="font-size:0.55rem;padding:1px 6px;border-radius:10px;background:${level === 0 ? '#fd7e14' : '#0d6efd'};color:white;">${levelLabel}</span>
                            <span class="folder-size" style="font-size:0.65rem;color:#6c757d;background:#f1f3f5;padding:1px 6px;border-radius:10px;">${sizeStr}</span>
                        </div>
                    </li>
                `;
            });
            
            html += '</ul>';
            container.innerHTML = html;
            
            var section = document.getElementById('folderTreeSection_' + pathId);
            if (section) {
                var header = section.querySelector('.folder-tree-header');
                if (header) {
                    var badge = header.querySelector('.badge');
                    if (badge) {
                        badge.textContent = folders.length;
                    }
                }
            }
        }

        // РЕНДЕРИНГ СПИСКОВ ПАПОК

        function buildNavigationHTML(pathId, currentPathName, rootPath) {
            var store = multipleDataStore[pathId];
            if (!store) return '';
            
            var parts = currentPathName.split('\\');
            var html = '';
            
            if (store.history && store.history.length > 0) {
                html += '<button class="btn-back" onclick="goBackMultiple(\'' + pathId + '\')"><i class="bi bi-arrow-left"></i> Назад</button>';
            }
            
            if (currentPathName !== rootPath && rootPath) {
                if (html) html += '<span class="nav-separator">|</span>';
                html += '<button class="btn-home" onclick="goHomeMultiple(\'' + pathId + '\')"><i class="bi bi-house"></i> Главная</button>';
            }
            
            if (html) html += '<span class="nav-separator">|</span>';
            html += '<button class="btn btn-sm btn-outline-primary" onclick="loadChartsFromDB(\'' + pathId + '\', \'' + encodeURIComponent(currentPathName) + '\')" style="font-size:0.75rem;padding:2px 8px;">';
            html += '<i class="bi bi-arrow-repeat"></i> Обновить графики</button>';
            
            if (parts.length > 1) {
                if (html) html += '<span class="nav-separator">|</span>';
                html += '<nav aria-label="breadcrumb" style="display:inline-block;">';
                html += '<ol class="breadcrumb-nav">';
                var currentPath = '';
                parts.forEach(function(part, i) {
                    if (part) {
                        currentPath += (i === 0 ? part : '\\' + part);
                        if (i === parts.length - 1) {
                            html += '<li class="breadcrumb-item active">' + part + '</li>';
                        } else {
                            var encoded = encodeURIComponent(currentPath);
                            html += '<li class="breadcrumb-item"><a onclick="navigateMultiplePathDB(\'' + pathId + '\', decodeURIComponent(\'' + encoded + '\'))">' + part + '</a></li>';
                        }
                    }
                });
                html += '</ol>';
                html += '</nav>';
            }
            
            if (!html) {
                html = '<span class="nav-empty"><i class="bi bi-house"></i> Корневой уровень</span>';
            }
            
            return html;
        }

        function renderFolderListLevel1(pathId, folders, basePath, currentPathName, rootPath) {
            var container = document.getElementById('itemsContainerLevel1_' + pathId);
            if (!container) return;
            
            var navContainer = document.getElementById('navContainerLevel1_' + pathId);
            if (navContainer) {
                navContainer.innerHTML = buildNavigationHTML(pathId, currentPathName, rootPath);
            }
            
            if (!folders || folders.length === 0) {
                container.innerHTML = '<div class="text-center text-muted py-3"><i class="bi bi-folder" style="font-size:1.5rem;"></i><p class="mt-1" style="font-size:0.9rem;">Нет папок</p></div>';
                return;
            }
            
            var html = '<div class="list-group">';
            folders.forEach(function(f) {
                var escapedPath = encodeURIComponent(basePath + '\\' + f.name);
                html += `
                    <div class="list-group-item d-flex justify-content-between align-items-center folder-clickable"

                container.innerHTML = '<div class="text-center text-muted py-3"><i class="bi bi-folder" style="font-size:1.5rem;"></i><p class="mt-1" style="font-size:0.9rem;">Нет папок</p></div>';

        function goBackMultiple(pathId) {
            var store = multipleDataStore[pathId];
            if (!store || !store.history || store.history.length === 0) {
                showToast('⚠️ Нет истории для возврата', 'warning');
                return;
            }
            
            var prev = store.history.pop();
            store.currentPath = prev.path;
            store.items = prev.items;
            store.level = prev.level;
            
            updatePathDisplay(pathId);
            
            if (store.level === 0) {
                document.getElementById('level2Section_' + pathId).classList.remove('active');
                document.getElementById('level2Section_' + pathId).style.display = 'none';
                document.getElementById('levelBadge_' + pathId).textContent = 'Уровень 1';
                document.getElementById('reportTitle_' + pathId).textContent = store.rootPath;
                
                renderFolderListLevel1(pathId, store.baseFolders, store.rootPath, store.rootPath, store.rootPath);
                document.getElementById('level1ItemsCount_' + pathId).textContent = store.baseFolders ? store.baseFolders.length : 0;
                buildFolderTree(pathId, store.baseFolders, store.rootPath, store.rootPath, 0);
                
                loadChartsFromDB(pathId, store.rootPath);
            } else {
                renderFolderListLevel2(pathId, store.items, store.currentPath);
                document.getElementById('level2ItemsCount_' + pathId).textContent = store.items ? store.items.length : 0;
            }
            
            showToast('⬅️ Возврат в ' + prev.path, 'info');
        }

        function goHomeMultiple(pathId) {
            var store = multipleDataStore[pathId];
            if (!store) return;
            
            if (store.level === 0) {
                showToast('⚠️ Вы уже на главном уровне', 'warning');
                return;
            }
            
            store.history = [];
            store.level = 0;
            store.currentPath = store.rootPath;
            store.items = store.baseFolders;
            
            document.getElementById('level2Section_' + pathId).classList.remove('active');
            document.getElementById('level2Section_' + pathId).style.display = 'none';
            document.getElementById('levelBadge_' + pathId).textContent = 'Уровень 1';
            document.getElementById('reportTitle_' + pathId).textContent = store.rootPath;
            
            renderFolderListLevel1(pathId, store.baseFolders, store.rootPath, store.rootPath, store.rootPath);
            document.getElementById('level1ItemsCount_' + pathId).textContent = store.baseFolders ? store.baseFolders.length : 0;
            buildFolderTree(pathId, store.baseFolders, store.rootPath, store.rootPath, 0);
            
            loadChartsFromDB(pathId, store.rootPath);
            
            showToast('🏠 Возврат на главный уровень: ' + store.rootPath, 'success');
        }

        function navigateMultiplePathDB(pathId, path) {
            var normalizedPath = normalizeUncPath(path);
            var store = multipleDataStore[pathId];
            if (!store) return;
            
            if (normalizedPath === store.currentPath) return;
            
            var foundIndex = -1;
            if (store.history) {
                for (var i = 0; i < store.history.length; i++) {
                    if (store.history[i].path === normalizedPath) {
                        foundIndex = i;
                        break;
                    }
                }
            }
            
            if (foundIndex !== -1) {
                var saved = store.history[foundIndex];
                store.history = store.history.slice(0, foundIndex);
                store.currentPath = saved.path;
                store.items = saved.items;
                store.level = saved.level;
                
                updatePathDisplay(pathId);
                
                if (store.level === 0) {
                    document.getElementById('level2Section_' + pathId).classList.remove('active');
                    document.getElementById('level2Section_' + pathId).style.display = 'none';
                    document.getElementById('levelBadge_' + pathId).textContent = 'Уровень 1';
                    document.getElementById('reportTitle_' + pathId).textContent = store.rootPath;
                    renderFolderListLevel1(pathId, store.baseFolders, store.rootPath, store.rootPath, store.rootPath);
                    buildFolderTree(pathId, store.baseFolders, store.rootPath, store.rootPath, 0);
                    loadChartsFromDB(pathId, store.rootPath);
                } else {
                    renderFolderListLevel2(pathId, store.items, store.currentPath);
                    document.getElementById('level2ItemsCount_' + pathId).textContent = store.items ? store.items.length : 0;
                }
                
                showToast('⬅️ Переход в ' + saved.path, 'info');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            
            browseFromDB(normalizedPath)
                .then(function(data) {
                    document.getElementById('loading').style.display = 'none';
                    if (data.error) { showToast('Ошибка: ' + data.error, 'error'); return; }
                    
                    var level = store.history ? store.history.length : 0;
                    store.currentPath = data.path;
                    store.items = data.items || [];
                    store.level = level;
                    
                    updatePathDisplay(pathId);
                    
                    if (data.chart) {
                        renderChart(data.chart, 'level2ChartDiv_' + pathId, pathId);
                    }
                    
                    if (data.sectioned_histogram) {
                        renderSectionedHistogram(data.sectioned_histogram, 'level2HistogramDiv_' + pathId, pathId);
                    }
                    
                    renderFolderListLevel2(pathId, data.items || [], data.path);
                    document.getElementById('level2ItemsCount_' + pathId).textContent = data.items ? data.items.length : 0;
                    
                    if (data.items && data.items.length > 0) {
                        var container = document.getElementById('folderTreeContainer_' + pathId);
                        if (container) {
                            var html = '<ul class="folder-tree" style="list-style:none;padding:0;margin:0;">';
                            html += `
                                <li style="padding:0;">
                                    <div class="folder-item" onclick="goHomeMultiple('${pathId}')" style="display:flex;align-items:center;padding:3px 8px;border-radius:4px;cursor:pointer;color:#007bff;font-weight:500;font-size:0.82rem;">
                                        <i class="bi bi-arrow-up-circle" style="color:#007bff;margin-right:6px;"></i>
                                        <span class="folder-name">.. (На уровень выше)</span>
                                    </div>
                                </li>
                            `;
                            data.items.forEach(function(f) {
                                var sizeStr = f.size_str || formatSize(f.size || 0);
                                html += `
                                    <li style="padding:0;">
                                        <div class="folder-item" style="display:flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:0.82rem;gap:6px;padding-left:20px;">
                                            <i class="bi bi-folder folder-icon" style="color:#0d6efd;font-size:0.85rem;"></i>
                                            <span class="folder-name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span>
                                            <span class="level-badge-sm level2" style="font-size:0.55rem;padding:1px 6px;border-radius:10px;background:#0d6efd;color:white;">L2</span>
                                            <span class="folder-size" style="font-size:0.65rem;color:#6c757d;background:#f1f3f5;padding:1px 6px;border-radius:10px;">${sizeStr}</span>
                                        </div>
                                    </li>
                                `;
                            });
                            html += '</ul>';
                            container.innerHTML = html;
                        }
                    }
                    
                    showToast('📂 Переход в ' + normalizedPath, 'info');
                })
                .catch(function(e) {
                    document.getElementById('loading').style.display = 'none';
                    showToast('❌ Ошибка: ' + e.message, 'error');
                });
        }

        function browseFolderMultipleDB(pathId, path) {
            var normalizedPath = normalizeUncPath(path);
            var store = multipleDataStore[pathId];
            if (!store) {
                showToast('⚠️ Ошибка: данные не найдены', 'error');
                return;
            }
            
            var parts = normalizedPath.split('\\').filter(function(p) { return p !== ''; });
            var rootParts = store.rootPath.split('\\').filter(function(p) { return p !== ''; });
            if (parts.length > rootParts.length + 1) {
                showToast('⚠️ Можно просматривать только до 2 уровня вложенности', 'warning');
                return;
            }
            
            if (!store.history) store.history = [];
            store.history.push({
                path: store.currentPath,
                items: store.items,
                level: store.level
            });
            
            document.getElementById('loading').style.display = 'block';
            
            browseFromDB(normalizedPath)
                .then(function(data) {
                    document.getElementById('loading').style.display = 'none';
                    if (data.error) { showToast('Ошибка: ' + data.error, 'error'); return; }
                    
                    store.currentPath = data.path;
                    store.items = data.items || [];
                    store.level = store.history.length;
                    
                    document.getElementById('levelBadge_' + pathId).textContent = 'Уровень 2';
                    document.getElementById('reportTitle_' + pathId).textContent = data.path;
                    
                    document.getElementById('level2Section_' + pathId).classList.add('active');
                    document.getElementById('level2Section_' + pathId).style.display = 'block';
                    document.getElementById('level2Path_' + pathId).textContent = data.path;
                    
                    if (data.chart) {
                        renderChart(data.chart, 'level2ChartDiv_' + pathId, pathId);
                    } else {

                                <p style="font-size:0.9rem;">Нет данных для графика</p>
                                <small>Нужно минимум 2 сканирования</small>

                    if (data.sectioned_histogram) {
                        renderSectionedHistogram(data.sectioned_histogram, 'level2HistogramDiv_' + pathId, pathId);
                    } else {
                        document.getElementById('level2HistogramDiv_' + pathId).innerHTML = `
                            <div class="text-center text-muted py-3">
                                <i class="bi bi-bar-chart" style="font-size:2rem;display:block;margin-bottom:6px;"></i>
                                <p style="font-size:0.9rem;">Нет данных для гистограммы</p>
                                <small>Нужно минимум 2 сканирования</small>
                            </div>
                        `;
                    }
                    
                    renderFolderListLevel2(pathId, data.items || [], data.path);
                    document.getElementById('level2ItemsCount_' + pathId).textContent = data.items ? data.items.length : 0;
                    
                    if (data.items && data.items.length > 0) {
                        var container = document.getElementById('folderTreeContainer_' + pathId);
                        if (container) {
                            var html = '<ul class="folder-tree" style="list-style:none;padding:0;margin:0;">';
                            html += `
                                <li style="padding:0;">
                                    <div class="folder-item" onclick="goHomeMultiple('${pathId}')" style="display:flex;align-items:center;padding:3px 8px;border-radius:4px;cursor:pointer;color:#007bff;font-weight:500;font-size:0.82rem;">
                                        <i class="bi bi-arrow-up-circle" style="color:#007bff;margin-right:6px;"></i>
                                        <span class="folder-name">.. (На уровень выше)</span>
                                    </div>
                                </li>
                            `;
                            data.items.forEach(function(f) {
                                var sizeStr = f.size_str || formatSize(f.size || 0);
                                html += `
                                    <li style="padding:0;">
                                        <div class="folder-item" style="display:flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:0.82rem;gap:6px;padding-left:20px;">
                                            <i class="bi bi-folder folder-icon" style="color:#0d6efd;font-size:0.85rem;"></i>
                                            <span class="folder-name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span>
                                            <span class="level-badge-sm level2" style="font-size:0.55rem;padding:1px 6px;border-radius:10px;background:#0d6efd;color:white;">L2</span>
                                            <span class="folder-size" style="font-size:0.65rem;color:#6c757d;background:#f1f3f5;padding:1px 6px;border-radius:10px;">${sizeStr}</span>
                                        </div>
                                    </li>
                                `;
                            });
                            html += '</ul>';
                            container.innerHTML = html;
                        }
                    } else {
                        var container = document.getElementById('folderTreeContainer_' + pathId);
                        if (container) {
                            container.innerHTML = `
                                <div class="empty-sidebar" style="padding:8px;font-size:0.8rem;color:#6c757d;">
                                    <i class="bi bi-folder" style="font-size:1.2rem;display:block;margin-bottom:4px;"></i>

                    renderFolderListLevel1(pathId, store.baseFolders, store.rootPath, store.rootPath, store.rootPath);
                    
                    showToast('📁 ' + normalizedPath + ' - ' + (data.items_count || 0) + ' элементов', 'info');

                .catch(function(e) {

        function updatePathDisplay(pathId) {
            var store = multipleDataStore[pathId];
            if (!store) return;
            
            var levelBadge = document.getElementById('levelBadge_' + pathId);
            var reportTitle = document.getElementById('reportTitle_' + pathId);
            var statItems = document.getElementById('statItems_' + pathId);
            var statSize = document.getElementById('statSize_' + pathId);
            var statScans = document.getElementById('statScans_' + pathId);
            
            if (levelBadge) levelBadge.textContent = store.level === 0 ? 'Уровень 1' : 'Уровень 2';
            if (reportTitle) reportTitle.textContent = store.currentPath;
            if (statItems) statItems.textContent = store.items ? store.items.length : 0;
            if (statSize) statSize.textContent = store.totalSizeStr || '0';
            if (statScans) statScans.textContent = store.scansCount || 0;
            
            var navContainer = document.getElementById('navContainerLevel1_' + pathId);
            if (navContainer) {

                            <div class="level-2-section" id="level2Section_${pathId}">

                                <div class="chart-section level-2">

                                        <i class="bi bi-folder"></i>
                                        📌 УРОВЕНЬ 2 - ОТКРЫТЫЙ КАТАЛОГ

                                        <h6><i class="bi bi-layers"></i> Гистограмма по папкам</h6>
                                        <div class="histogram-wrapper-scroll">
                                            <div id="level2HistogramDiv_${pathId}">
                                                <div class="text-center text-muted py-3">
                                                    <i class="bi bi-bar-chart" style="font-size:2rem;display:block;margin-bottom:6px;"></i>
                                                    <p style="font-size:0.9rem;">Нет данных</p>
                                                    <small>Откройте папку уровня 2</small>

                `;
                
                container.innerHTML += cardHtml;
                
                renderFolderListLevel1(pathId, data.folders || [], data.path, data.path, data.path);
            });
            
            updateSidebar();
            
            results.forEach(function(data, index) {
                var pathId = 'path_' + (index + 1);
                setTimeout(function() {
                    loadChartsFromDB(pathId, data.path);
                }, 500 + index * 200);
            });
            
            showToast('✅ Загружено ' + results.length + ' отчетов', 'success');
        }

        // ============================================================
        // ОТКРЫТИЕ / ЗАКРЫТИЕ ОТЧЕТА
        // ============================================================

        function openReport(path) {
            var normalizedPath = normalizeUncPath(path);
            
            document.getElementById('loading').style.display = 'block';
            fetch('/api/report', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ path: normalizedPath })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('loading').style.display = 'none';
                if (data.error) { showToast('Ошибка: ' + data.error, 'error'); return; }
                showMultipleReports([data]);
            })
            .catch(function(e) {
                document.getElementById('loading').style.display = 'none';
                showToast('❌ Ошибка: ' + e.message, 'error');
            });
        }

        function closeReport() {
            document.getElementById('reportSection').style.display = 'none';
            document.getElementById('mainContent').innerHTML = '';
            document.getElementById('folderTreeContainer').innerHTML = `
                <div class="empty-sidebar">
                    <i class="bi bi-folder" style="font-size:2rem;display:block;margin-bottom:10px;"></i>
                    Нет папок для отображения
                </div>
            `;
            document.getElementById('folderCountBadge').textContent = '0';
            multipleDataStore = {};
            currentPathId = null;
        }

        // ============================================================
        // ПАСХАЛКА - ЭПИЧНЫЙ "ЖАХ!" (F2)
        // ============================================================

        (function() {
            var isExploding = false;
            
            function createExplosion() {
                if (isExploding) return;
                isExploding = true;
                
                var flash = document.createElement('div');
                flash.className = 'flash-overlay';
                document.body.appendChild(flash);
                setTimeout(function() {
                    if (flash.parentElement) flash.remove();
                }, 400);
                
                var shockwave = document.createElement('div');
                shockwave.className = 'shockwave';
                document.body.appendChild(shockwave);
                setTimeout(function() {
                    if (shockwave.parentElement) shockwave.remove();
                }, 1200);
                
                document.body.classList.add('shake');
                setTimeout(function() {
                    document.body.classList.remove('shake');
                }, 900);
                
                var text = document.createElement('div');
                text.className = 'explosion-text';
                text.textContent = '💥 ЖАХ! 💥';
                document.body.appendChild(text);
                
                var container = document.createElement('div');
                container.className = 'explosion-container';
                document.body.appendChild(container);
                
                var colors = ['#ff6b6b', '#ff9f43', '#feca57', '#48dbfb', '#0abde3', '#10ac84', '#ee5a24', '#5f27cd', '#ff6b6b', '#f368e0', '#ff9f43', '#54a0ff', '#ff4757', '#2ed573', '#7bed9f'];
                
                for (var i = 0; i < 120; i++) {
                    var particle = document.createElement('div');
                    particle.className = 'explosion-particle';
                    var size = Math.random() * 25 + 8;
                    var x = Math.random() * window.innerWidth;
                    var y = Math.random() * window.innerHeight;
                    var tx = (Math.random() - 0.5) * 1400;
                    var ty = (Math.random() - 0.5) * 1000;
                    var color = colors[Math.floor(Math.random() * colors.length)];
                    var duration = Math.random() * 0.5 + 0.8;
                    
                    particle.style.cssText = `
                        left: ${x}px;
                        top: ${y}px;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${color};
                        --tx: ${tx}px;
                        --ty: ${ty}px;
                        animation-duration: ${duration}s;
                        border-radius: ${Math.random() > 0.5 ? '50%' : '4px'};
                        box-shadow: 0 0 15px ${color};
                    `;
                    container.appendChild(particle);
                }
                
                var starSymbols = ['✦', '✧', '⭐', '🌟', '💫'];
                for (var i = 0; i < 30; i++) {
                    var star = document.createElement('div');
                    star.className = 'star-particle';
                    star.textContent = starSymbols[Math.floor(Math.random() * starSymbols.length)];
                    var x = Math.random() * window.innerWidth;
                    var y = Math.random() * window.innerHeight;
                    var tx = (Math.random() - 0.5) * 1000;
                    var ty = (Math.random() - 0.5) * 800;
                    var tx2 = (Math.random() - 0.5) * 1200;
                    var ty2 = (Math.random() - 0.5) * 900;
                    star.style.cssText = `
                        left: ${x}px;
                        top: ${y}px;
                        font-size: ${Math.random() * 25 + 15}px;
                        --tx: ${tx}px;
                        --ty: ${ty}px;
                        --tx2: ${tx2}px;
                        --ty2: ${ty2}px;
                        animation-duration: ${Math.random() * 0.5 + 1.5}s;
                    `;
                    container.appendChild(star);
                }
                
                for (var i = 0; i < 60; i++) {
                    var spark = document.createElement('div');
                    spark.className = 'spark';
                    var x = window.innerWidth / 2 + (Math.random() - 0.5) * 200;
                    var y = window.innerHeight / 2 + (Math.random() - 0.5) * 200;
                    var sx = (Math.random() - 0.5) * 800;
                    var sy = (Math.random() - 0.5) * 800 - 300;
                    var size = Math.random() * 6 + 3;
                    var color = ['#ffd700', '#ff6b00', '#ff4500', '#ffa500'][Math.floor(Math.random() * 4)];
                    spark.style.cssText = `
                        left: ${x}px;
                        top: ${y}px;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${color};
                        --sx: ${sx}px;
                        --sy: ${sy}px;
                        animation-duration: ${Math.random() * 0.3 + 0.8}s;
                        box-shadow: 0 0 15px ${color};
                    `;
                    document.body.appendChild(spark);
                    setTimeout(function(el) {
                        if (el && el.parentElement) el.remove();
                    }, 1500, spark);
                }
                
                var fireColors = ['#ff4500', '#ff6b00', '#ff8c00', '#ffa500', '#ffd700'];
                for (var i = 0; i < 50; i++) {
                    var fire = document.createElement('div');
                    fire.className = 'fire-particle';
                    var x = window.innerWidth / 2 + (Math.random() - 0.5) * 100;
                    var y = window.innerHeight / 2 + (Math.random() - 0.5) * 100;
                    var fx = (Math.random() - 0.5) * 400;
                    var fy = -Math.random() * 600 - 100;
                    var size = Math.random() * 15 + 5;
                    var fireColor = fireColors[Math.floor(Math.random() * fireColors.length)];
                    fire.style.cssText = `
                        left: ${x}px;
                        top: ${y}px;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${fireColor};
                        --fx: ${fx}px;
                        --fy: ${fy}px;
                        animation-duration: ${Math.random() * 0.4 + 0.8}s;
                        border-radius: 50%;
                        box-shadow: 0 0 20px rgba(255, 100, 0, 0.5);
                    `;
                    container.appendChild(fire);
                }
                
                var confettiColors = ['#ff6b6b', '#ff9f43', '#feca57', '#48dbfb', '#0abde3', '#10ac84', '#ee5a24', '#5f27cd', '#ff6b6b', '#f368e0', '#ff9f43', '#54a0ff', '#2ed573', '#ff4757'];
                for (var i = 0; i < 60; i++) {
                    var confetti = document.createElement('div');
                    confetti.className = 'confetti-piece';
                    var x = Math.random() * window.innerWidth;
                    var color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
                    var width = Math.random() * 12 + 5;
                    var height = Math.random() * 22 + 10;
                    var duration = Math.random() * 2 + 2;
                    var delay = Math.random() * 0.8;
                    var rotation = Math.random() * 360;
                    
                    confetti.style.cssText = `
                        left: ${x}px;
                        top: -30px;
                        width: ${width}px;
                        height: ${height}px;
                        background: ${color};
                        animation-duration: ${duration}s;
                        animation-delay: ${delay}s;
                        transform: rotate(${rotation}deg);
                        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
                    `;
                    document.body.appendChild(confetti);
                    setTimeout(function(el) {
                        if (el && el.parentElement) el.remove();
                    }, 4500, confetti);
                }
                
                setTimeout(function() {
                    if (text.parentElement) text.remove();
                    if (container.parentElement) container.remove();
                    isExploding = false;
                }, 2800);
            }
            
            document.addEventListener('keydown', function(e) {
                if (e.key === 'F2') {
                    e.preventDefault();
                    createExplosion();
                }
            });
        })();

        // ============================================================
        // ОБРАБОТКА ФОРМЫ СКАНИРОВАНИЯ
        // ============================================================

        document.getElementById('scanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (pathsToScan.length === 0) { showToast('Добавьте путь', 'warning'); return; }
            
            var btn = document.getElementById('scanBtn');
            var progress = document.getElementById('scanProgress');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Сканирование...';
            progress.style.display = 'block';

            var reportSection = document.getElementById('reportSection');
            if (reportSection) {
                reportSection.style.display = 'none';
            }

            var promises = pathsToScan.map(function(path) {
                return scanSinglePath(path)
                    .then(function(data) { return { success: true, data: data }; })
                    .catch(function(err) {
                        console.error('❌ Ошибка для ' + path + ':', err);
                        return { success: false, path: path, error: err.message };
                    });
            });

            Promise.all(promises)
                .then(function(results) {
                    var valid = results.filter(function(r) { return r.success; }).map(function(r) { return r.data; });
                    var errors = results.filter(function(r) { return !r.success; });
                    
                    if (errors.length > 0) {
                        errors.forEach(function(e) { showToast('Ошибка сканирования ' + e.path + ': ' + e.error, 'error'); });
                    }
                    
                    if (valid.length === 0) {
                        showToast('Ни один путь не был успешно отсканирован', 'error');
                        return;
                    }
                    
                    showToast('✅ Сканирование завершено! Обработано ' + valid.length + ' путей', 'success');
                    loadPaths();
                    
                    showMultipleReports(valid);
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-play-fill"></i> Сканировать все пути';
                    progress.style.display = 'none';
                });
        });

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================

        updatePathTags();
        loadPaths();
        console.log('✅ Приложение загружено.');
        console.log('✅ Графики загружаются из БД при открытии отчета');
        console.log('✅ Гистограмма с ОТДЕЛЬНЫМИ подгистограммами (SUBPLOTS) для каждой папки');
        console.log('✅ Подписи дат ПОВЕРНУТЫ НА 90 ГРАДУСОВ');
        console.log('✅ Столбцы внутри подгистограммы ВПРИТЫК');
        console.log('✅ ВЕРТИКАЛЬНЫЙ СКРОЛЛ для просмотра всех папок');
        console.log('✅ Каждая папка - свой цвет');
        console.log('✅ Легенда ВЕРТИКАЛЬНАЯ и находится СПРАВА от графика');
        console.log('✅ Клик по легенде - скрывает/показывает папку на графике');
        console.log('📂 Боковая панель показывает все сканированные пути с разделителями');
        console.log('📊 Во всплывающих подсказках отображаются названия папок');
        console.log('💥 Пасхалка: нажми F2 для ЭПИЧНОГО взрыва "ЖАХ!"');
    </script>
